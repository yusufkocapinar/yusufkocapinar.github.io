<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doku | YK. Dijital Arşiv</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Tenor+Sans&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #F5F5F3; --text-main: #2C2A29; --accent: #B39B78;
            --border-color: rgba(179, 155, 120, 0.2); 
            --font-serif: 'Playfair Display', serif; --font-sans: 'Tenor Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
        
        /* MERMER DOKUSU */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.025"/></svg>'); pointer-events: none; z-index: 50; }

        #custom-cursor { position: fixed; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: 0.3s; }
        #custom-cursor.hover { width: 40px; height: 40px; background: rgba(179, 155, 120, 0.1); border: 1px solid var(--accent); }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 4vw; }

        nav { position: fixed; top: 0; width: 100%; background: rgba(245, 245, 243, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); padding: 20px 0; z-index: 100; }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-serif); font-size: 1.5rem; text-decoration: none; color: var(--text-main); font-weight: 700; }

        .page-header { padding: 180px 0 60px 0; text-align: center; }
        .room-title { font-family: var(--font-serif); font-size: clamp(3rem, 8vw, 5rem); font-weight: 400; margin-bottom: 10px; }
        .room-tag { font-size: 0.7rem; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; }

        /* MASONRY (DÜZENLİ SÜTUN) YAPISI */
        .gallery-container { 
            columns: 2; /* İki sütunlu düzen */
            column-gap: 40px; /* Sütunlar arası eşit boşluk */
            padding-bottom: 100px;
        }

        .gallery-item { 
            break-inside: avoid; /* Görselin bölünmesini engeller */
            margin-bottom: 40px; /* Alt alta gelen görseller arası eşit boşluk */
            position: relative;
            overflow: hidden;
            background: #eee;
            display: block;
        }

        .gallery-img { 
            width: 100%; 
            display: block; 
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            filter: grayscale(15%);
        }

        .gallery-item:hover .gallery-img { transform: scale(1.02); filter: grayscale(0%); }

        .gallery-info {
            padding: 20px 0;
            border-top: 1px solid var(--border-color);
            margin-top: 10px;
        }

        .gallery-info h3 { font-family: var(--font-serif); font-size: 1.2rem; font-weight: 400; }
        .gallery-info p { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        @media (max-width: 800px) { .gallery-container { columns: 1; } }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    
    <nav>
        <div class="container nav-inner">
            <a href="index.html" class="logo hover-target">YK.</a>
            <a href="admin.html" style="font-size: 0.7rem; text-decoration: none; color: var(--accent); letter-spacing: 2px;">PANEL</a>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <span class="room-tag">Arşiv No. 03</span>
            <h1 class="room-title">Doku.</h1>
        </header>

        <section class="gallery-container" id="dynamic-gallery">
            <!-- Görseller buraya gelecek -->
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4",
            authDomain: "yk-blog-9720b.firebaseapp.com",
            projectId: "yk-blog-9720b",
            messagingSenderId: "863054301539",
            appId: "1:863054301539:web:4256589fbef613bd0e6b56"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadGallery() {
            const container = document.getElementById('dynamic-gallery');
            try {
                const q = query(collection(db, "doku"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                container.innerHTML = '';

                snap.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="gallery-item hover-target">
                            <img src="${data.imageUrl}" class="gallery-img">
                            <div class="gallery-info">
                                <h3>${data.title}</h3>
                                <p>${data.category || 'Genel'} — ${data.year || ''}</p>
                            </div>
                        </div>
                    `;
                });

                // Cursor etkisini güncelle
                const cursor = document.getElementById('custom-cursor');
                document.querySelectorAll('.hover-target').forEach(t => {
                    t.addEventListener('mouseover', () => cursor.classList.add('hover'));
                    t.addEventListener('mouseout', () => cursor.classList.remove('hover'));
                });
            } catch (e) { console.error(e); }
        }
        loadGallery();

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
