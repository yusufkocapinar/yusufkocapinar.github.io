<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doku | YK. Dijital Arşiv</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Tenor+Sans&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #F5F5F3; --text-main: #2C2A29; --text-muted: #7A7A7A;
            --accent: #B39B78; --border-color: rgba(179, 155, 120, 0.2); 
            --transition-premium: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            --font-serif: 'Playfair Display', serif; --font-sans: 'Tenor Sans', sans-serif; --font-reading: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        body.no-scroll { overflow: hidden; }

        /* MERMER DOKUSU */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.025"/></svg>'); pointer-events: none; z-index: 50; }

        #custom-cursor { position: fixed; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s, opacity 0.3s; }
        #custom-cursor.hover { width: 40px; height: 40px; background: rgba(179, 155, 120, 0.05); border: 1px solid var(--accent); opacity: 1; mix-blend-mode: difference; }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 4vw; position: relative; z-index: 10; }

        nav { position: fixed; top: 0; left: 0; width: 100%; background-color: rgba(245, 245, 243, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); padding: 20px 0; z-index: 100; }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 700; text-decoration: none; color: var(--text-main); }
        
        .nav-actions { display: flex; align-items: center; gap: 30px; }
        .menu-toggle { background: none; border: none; font-family: var(--font-sans); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-main); display: flex; align-items: center; gap: 8px; }

        /* MENÜ */
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-color: var(--bg-color); z-index: 999; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; clip-path: circle(0% at top right); transition: all 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
        .menu-overlay.active { opacity: 1; visibility: visible; clip-path: circle(150% at top right); }
        .overlay-nav { display: flex; flex-direction: column; gap: 40px; text-align: center; }
        .overlay-link { font-family: var(--font-serif); font-size: clamp(3rem, 6vw, 5rem); color: var(--text-main); text-decoration: none; transition: 0.4s; }
        .overlay-link:hover { color: var(--accent); transform: italic; }

        .page-header { padding: 220px 0 60px 0; border-bottom: 1px solid var(--border-color); }
        .room-tag { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); margin-bottom: 20px; display: block; }
        .room-title { font-family: var(--font-serif); font-size: clamp(4rem, 10vw, 7rem); font-weight: 400; line-height: 1; margin-bottom: 30px; }

        /* FERAH GALERİ DÜZENİ */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 120px 40px; /* Dikeyde 120px, Yatayda 40px boşluk */
            padding: 100px 0 160px 0; 
        }

        .gallery-item { position: relative; overflow: hidden; display: block; background: #E8E8E8; opacity: 0; transform: translateY(30px); animation: fadeUp 1s ease forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .gallery-img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s ease; filter: grayscale(10%); }
        .gallery-item:hover .gallery-img { transform: scale(1.03); filter: grayscale(0%); }

        .gallery-caption { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); color: #fff; opacity: 0; transition: 0.5s; }
        .gallery-item:hover .gallery-caption { opacity: 1; }

        /* ASİMETRİK AMA TEMİZ YERLEŞİM */
        .gi-1 { grid-column: span 5; aspect-ratio: 3/4; }
        .gi-2 { grid-column: span 7; aspect-ratio: 16/10; }
        .gi-3 { grid-column: span 6; aspect-ratio: 1/1; margin-top: 40px; }
        .gi-4 { grid-column: span 6; aspect-ratio: 16/10; align-self: center; }

        .loading-text { grid-column: 1 / -1; text-align: center; font-size: 0.8rem; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; padding: 100px 0; }

        @media (max-width: 900px) {
            .gallery-grid { display: flex; flex-direction: column; gap: 60px; }
            .gi-1, .gi-2, .gi-3, .gi-4 { aspect-ratio: auto; min-height: 400px; margin-top: 0; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    
    <div class="menu-overlay" id="overlay">
        <nav class="overlay-nav">
            <a href="index.html" class="overlay-link hover-target">Giriş</a>
            <a href="sentez.html" class="overlay-link hover-target">Sentez</a>
            <a href="perspektif.html" class="overlay-link hover-target">Perspektif</a>
            <a href="doku.html" class="overlay-link hover-target">Doku</a>
        </nav>
    </div>

    <nav>
        <div class="container nav-inner">
            <a href="index.html" class="logo hover-target">YK.</a>
            <div class="nav-actions">
                <button class="menu-toggle hover-target" id="open-menu">Menü <i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <span class="room-tag">03 &mdash; Görsel Tasarım</span>
            <h1 class="room-title">Doku.</h1>
        </header>

        <section class="gallery-grid" id="dynamic-gallery">
            <div class="loading-text">Arşiv Hazırlanıyor...</div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4",
            authDomain: "yk-blog-9720b.firebaseapp.com",
            projectId: "yk-blog-9720b",
            messagingSenderId: "863054301539",
            appId: "1:863054301539:web:4256589fbef613bd0e6b56"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadGallery() {
            const container = document.getElementById('dynamic-gallery');
            try {
                const q = query(collection(db, "doku"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                container.innerHTML = '';

                let i = 0;
                snap.forEach(doc => {
                    const data = doc.data();
                    const layout = `gi-${(i % 4) + 1}`;
                    container.innerHTML += `
                        <div class="gallery-item ${layout} hover-target">
                            <img src="${data.imageUrl}" class="gallery-img">
                            <div class="gallery-caption">
                                <h3 style="font-family: 'Playfair Display'">${data.title}</h3>
                                <p style="font-size: 0.8rem; opacity: 0.8">${data.category || ''}</p>
                            </div>
                        </div>
                    `;
                    i++;
                });

                // İmleç etkisini yeni gelenlere de ekle
                const cursor = document.getElementById('custom-cursor');
                document.querySelectorAll('.hover-target').forEach(t => {
                    t.addEventListener('mouseover', () => cursor.classList.add('hover'));
                    t.addEventListener('mouseout', () => cursor.classList.remove('hover'));
                });
            } catch (e) { container.innerHTML = '<div class="loading-text">Bağlantı Hatası.</div>'; }
        }
        loadGallery();

        // Menü kontrolleri
        const open = document.getElementById('open-menu');
        const overlay = document.getElementById('overlay');
        open.addEventListener('click', () => overlay.classList.toggle('active'));
    </script>

    <script>
        // İmleç takibi
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
