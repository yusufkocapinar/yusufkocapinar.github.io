<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perspektif | YK. Dijital Arşiv</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2275%22 font-family=%22'Playfair Display', serif%22 font-size=%2280%22 font-weight=%22bold%22 fill=%22%232C2A29%22>YK.</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tenor+Sans&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #F5F5F3; --text-main: #2C2A29; --text-muted: #7A7A7A;
            --accent: #B39B78; --border-color: rgba(179, 155, 120, 0.2); 
            --font-serif: 'Playfair Display', serif; --font-sans: 'Tenor Sans', sans-serif;
            --font-signature: 'Great Vibes', cursive;
            --card-bg: #FFFFFF;
            --transition-premium: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden;}
        body.no-scroll { overflow: hidden; }

        *:focus-visible { outline: 1px dashed var(--accent); outline-offset: 4px; }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.025"/></svg>'); pointer-events: none; z-index: 50; }

        @media (pointer: fine) {
            * { cursor: none; }
            #custom-cursor { position: fixed; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: width 0.15s ease-out, height 0.15s ease-out, background 0.15s ease-out; }
            #custom-cursor.hover { width: 40px; height: 40px; background: rgba(179, 155, 120, 0.1); border: 1px solid var(--accent); opacity: 1;}
        }
        @media (pointer: coarse) {
            #custom-cursor { display: none !important; }
            * { cursor: auto !important; }
        }

        .container { max-width: 900px; margin: 0 auto; padding: 0 5vw; position: relative; z-index: 10; }

        header.top-nav { position: fixed; top: 0; left: 0; width: 100%; padding: 30px 4vw; z-index: 100; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
        .brand-group { display: flex; align-items: center; gap: 15px; pointer-events: auto; transition: var(--transition-premium); }
        .brand-group:hover { transform: scale(1.02); }
        .palestine-crest { height: 45px; width: auto; stroke: var(--accent); stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .logo-signature { font-family: var(--font-signature); font-size: 2.8rem; color: var(--text-main); text-decoration: none; line-height: 1; transform: rotate(-3deg); padding-top: 10px; }

        .header-controls { pointer-events: auto; background: rgba(245, 245, 243, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(179, 155, 120, 0.3); border-radius: 50px; display: flex; align-items: center; gap: 20px; padding: 6px 6px 6px 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: var(--transition-premium); }
        .header-controls:hover { border-color: var(--accent); background: rgba(245, 245, 243, 0.9); }
        .login-link { font-family: var(--font-sans); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); text-decoration: none; transition: 0.3s; }
        .login-link:hover { color: var(--accent); }
        .menu-toggle { background: var(--text-main); color: var(--bg-color); border: none; border-radius: 40px; padding: 12px 25px; font-family: var(--font-sans); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; transition: var(--transition-premium); cursor: pointer;}
        .menu-toggle:hover { background: var(--accent); transform: scale(1.05); }

        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-color: var(--bg-color); z-index: 999; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; clip-path: circle(0% at top right); transition: opacity 0.6s ease, visibility 0.6s ease, clip-path 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
        .menu-overlay.active { opacity: 1; visibility: visible; clip-path: circle(150% at top right); }
        .overlay-close { position: absolute; top: 30px; right: 4vw; font-family: var(--font-sans); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-main); background: none; border: none; z-index: 1000; padding: 10px; cursor: pointer;}
        
        .overlay-nav { display: flex; flex-direction: column; gap: 40px; text-align: center; }
        .overlay-link { font-family: var(--font-serif); font-size: clamp(3rem, 6vw, 5rem); color: var(--text-main); text-decoration: none; display: block; transform: translateY(30px); opacity: 0; transition: var(--transition-premium); }
        .overlay-link span { display: block; font-family: var(--font-sans); font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 4px; margin-top: 10px; }
        .menu-overlay.active .overlay-link { transform: translateY(0); opacity: 1; }
        .overlay-link:hover { color: var(--accent); }

        .page-header { padding: 180px 0 60px 0; text-align: center; border-bottom: 1px solid var(--border-color); margin-bottom: 60px;}
        .room-tag { font-family: var(--font-sans); font-size: 0.75rem; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; display: block; }
        .room-title { font-family: var(--font-serif); font-size: clamp(3.5rem, 8vw, 6rem); font-weight: 400; line-height: 1.1; }

        .journal-list { max-width: 750px; margin: 0 auto; padding-bottom: 150px; }
        
        .journal-item { 
            text-align: center; padding: 60px 0; border-bottom: 1px dashed var(--border-color); 
            opacity: 0; transform: translateY(20px); animation: fadeUp 1s ease forwards;
            transition: var(--transition-premium); cursor: pointer; outline: none;
        }
        .journal-item:last-child { border-bottom: none; }
        .journal-item:hover { transform: translateY(-5px); }

        .j-meta { font-family: var(--font-sans); font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 20px; display: flex; justify-content: center; gap: 15px; align-items: center; text-transform: uppercase; }
        .j-meta span.sep { color: var(--border-color); }
        
        .j-title { font-family: var(--font-serif); font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight: 400; margin-bottom: 25px; line-height: 1.2; color: var(--text-main); transition: 0.3s; }
        .journal-item:hover .j-title, .journal-item:focus-visible .j-title { color: var(--accent); font-style: italic; }

        .j-excerpt { font-size: 1.1rem; line-height: 1.8; color: var(--text-muted); font-weight: 300; margin-bottom: 30px; max-width: 600px; margin-left: auto; margin-right: auto; }
        
        .read-more { display: inline-block; font-family: var(--font-sans); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-main); border-bottom: 1px solid var(--accent); padding-bottom: 2px; font-weight: 600; transition: 0.3s; background: none; border-top: none; border-left: none; border-right: none; cursor: pointer;}
        .journal-item:hover .read-more { color: var(--accent); border-bottom-color: transparent; }

        .loading-text { text-align: center; padding: 100px 0; font-family: var(--font-sans); letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }

        #reading-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--bg-color); z-index: 9999; overflow-y: auto; display: none; opacity: 0; transition: opacity 0.4s ease; padding: 60px 4vw; }
        #reading-modal.active { display: block; opacity: 1; }
        .reading-container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 80px 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.03); border: 1px solid var(--border-color); position: relative; }
        #close-reading { position: absolute; top: 20px; right: 20px; background: none; border: none; font-family: var(--font-sans); font-size: 0.8rem; letter-spacing: 2px; color: var(--text-muted); transition: 0.3s; padding: 10px; cursor: pointer; }
        #close-reading:hover { color: #d9534f; }
        #read-title { font-family: var(--font-serif); font-size: 2.8rem; margin-bottom: 10px; line-height: 1.2; font-weight: 400; color: var(--text-main); }
        #read-meta { font-family: var(--font-sans); font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; display: block; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        #read-content { font-size: 1.1rem; line-height: 2; color: var(--text-main); font-weight: 300; white-space: pre-wrap; }

        /* MOBİL GÜNCELLEMELERİ VE ÇARPIŞMA ENGELLEYİCİ */
        @media (max-width: 900px) {
            header.top-nav { padding: 15px 4vw; }
            .brand-group { gap: 8px; }
            .palestine-crest { height: 26px; }
            .logo-signature { font-size: 1.6rem; padding-top: 5px; }
            .header-controls { padding: 4px; gap: 0; border-radius: 40px;}
            .login-link { display: none !important; }
            .menu-toggle { padding: 8px 16px; font-size: 0.65rem; gap: 6px; }
            
            .reading-container { padding: 50px 25px; border: none; box-shadow: none; background: transparent; }
            #read-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    
    <div class="menu-overlay" id="overlay">
        <button class="overlay-close hover-target" tabindex="0" id="close-menu">Kapat ✕</button>
        <nav class="overlay-nav">
            <a href="index.html" class="overlay-link hover-target">Giriş <span>Ana Sayfa & Vitrin</span></a>
            <a href="sentez.html" class="overlay-link hover-target">Sentez <span>Akademik Projeler & Kod</span></a>
            <a href="doku.html" class="overlay-link hover-target">Doku <span>Sanat & Estetik</span></a>
        </nav>
    </div>

    <header class="top-nav">
        <div class="brand-group hover-target">
            <svg class="palestine-crest" viewBox="0 0 100 200" title="Palestine">
                <path d="M45,5 L60,25 C65,40 60,70 55,100 L40,185 C35,195 25,195 20,185 L10,120 C5,90 15,45 45,5 Z"/>
            </svg>
            <a href="index.html" class="logo-signature">Y. Kocapınar</a>
        </div>
        <div class="header-controls">
            <a href="login.html" class="login-link hover-target">Giriş</a>
            <button class="menu-toggle hover-target" id="open-menu">Menü <i class="fas fa-bars"></i></button>
        </div>
    </header>

    <main class="container">
        <header class="page-header">
            <span class="room-tag">Bölüm 02 &mdash; Felsefe & Gözlem</span>
            <h1 class="room-title">Perspektif.</h1>
        </header>

        <section class="journal-list" id="dynamic-writings">
            <div class="loading-text">Düşünceler Toplanıyor...</div>
        </section>
    </main>

    <div id="reading-modal" role="dialog" aria-modal="true">
        <div class="reading-container">
            <button id="close-reading" class="hover-target" tabindex="0">KAPAT ✕</button>
            <h2 id="read-title">Başlık</h2>
            <span id="read-meta">Kategori - Tarih</span>
            <div id="read-content">İçerik buraya gelecek...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4", authDomain: "yk-blog-9720b.firebaseapp.com", projectId: "yk-blog-9720b", messagingSenderId: "863054301539", appId: "1:863054301539:web:4256589fbef613bd0e6b56" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // GÜNCELLEME: Firebase Hatasını önleyen Kurşungeçirmez Sıralama Sistemi
        async function loadWritings() {
            const container = document.getElementById('dynamic-writings');
            try {
                const snap = await getDocs(collection(db, "perspektif"));
                container.innerHTML = '';

                if(snap.empty) { container.innerHTML = '<div class="loading-text">Bu odada henüz bir düşünce paylaşılmadı.</div>'; return; }

                let items = [];
                snap.forEach(doc => items.push({id: doc.id, ...doc.data()}));

                // JavaScript ile en yeni üste gelecek şekilde sıralama
                items.sort((a, b) => {
                    const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                    const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                    return timeB - timeA;
                });

                items.forEach(data => {
                    const article = document.createElement('article');
                    article.className = 'journal-item hover-target';
                    article.setAttribute('tabindex', '0'); 
                    
                    article.innerHTML = `
                        <div class="j-meta">
                            <span>${data.type || 'Deneme'}</span>
                            <span class="sep">/</span>
                            <span>${data.date || '—'}</span>
                        </div>
                        <h2 class="j-title">${data.title}</h2>
                        <p class="j-excerpt">${data.excerpt}</p>
                        <span class="read-more" tabindex="-1">Tamamını Oku &rarr;</span>
                    `;

                    const openModal = () => {
                        document.getElementById('read-title').innerText = data.title;
                        document.getElementById('read-meta').innerText = `${data.type || 'Deneme'} — ${data.date || ''}`;
                        document.getElementById('read-content').innerText = data.content || data.excerpt + "\n\n(Bu yazının tam metni arşivde bulunamadı.)";
                        document.body.style.overflow = 'hidden';
                        document.getElementById('reading-modal').classList.add('active');
                        document.getElementById('close-reading').focus();
                    };

                    article.onclick = openModal;
                    article.addEventListener('keydown', (e) => { if (e.key === 'Enter') openModal(); });
                    
                    container.appendChild(article);
                });

                if (window.matchMedia("(pointer: fine)").matches) {
                    const cursor = document.getElementById('custom-cursor');
                    document.querySelectorAll('.hover-target').forEach(t => {
                        t.addEventListener('mouseover', () => cursor.classList.add('hover'));
                        t.addEventListener('mouseout', () => cursor.classList.remove('hover'));
                    });
                }
            } catch (e) { 
                console.error(e);
                container.innerHTML = '<div class="loading-text">İçerikler Yüklenirken Bir Hata Oluştu.</div>'; 
            }
        }
        loadWritings();

        const closeModal = () => { document.getElementById('reading-modal').classList.remove('active'); document.body.style.overflow = 'auto'; }
        document.getElementById('close-reading').addEventListener('click', closeModal);

        const toggleMenu = () => { 
            const overlay = document.getElementById('overlay');
            overlay.classList.toggle('active'); document.body.classList.toggle('no-scroll'); 
            if(overlay.classList.contains('active')) document.getElementById('close-menu').focus();
        };
        document.getElementById('open-menu').addEventListener('click', toggleMenu);
        document.getElementById('close-menu').addEventListener('click', toggleMenu);
        document.querySelectorAll('.overlay-link').forEach(link => { link.addEventListener('click', toggleMenu); });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if(document.getElementById('reading-modal').classList.contains('active')) closeModal();
                if(document.getElementById('overlay').classList.contains('active')) toggleMenu();
            }
        });

        if (window.matchMedia("(pointer: fine)").matches) {
            const cursor = document.getElementById('custom-cursor');
            document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
        }
    </script>
</body>
</html>
