<html lang="tr">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tenor+Sans&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #F5F5F3; --text-main: #2C2A29; --text-muted: #7A7A7A;
            --accent: #B39B78; --border-color: rgba(179, 155, 120, 0.2); 
            --font-serif: 'Playfair Display', serif; --font-sans: 'Tenor Sans', sans-serif;
            --card-bg: #FFFFFF; /* Modal için arka plan eklendi */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden;}

        /* MERMER DOKUSU */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.025"/></svg>'); pointer-events: none; z-index: 50; }

        /* GÜNCELLEME: HIZLI İMLEÇ VE MOBİL İPTALİ */
        @media (pointer: fine) {
            * { cursor: none; }
            #custom-cursor { position: fixed; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: width 0.15s ease-out, height 0.15s ease-out, background 0.15s ease-out; }
            #custom-cursor.hover { width: 40px; height: 40px; background: rgba(179, 155, 120, 0.1); border: 1px solid var(--accent); opacity: 1;}
        }
        @media (pointer: coarse) {
            #custom-cursor { display: none !important; }
            * { cursor: auto !important; }
        }

        .container { max-width: 900px; margin: 0 auto; padding: 0 5vw; position: relative; z-index: 10; }

        /* GÜNCELLEME: ESTETİK İÇ NAVİGASYON */
        nav { position: fixed; top: 0; width: 100%; background: rgba(245, 245, 243, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); padding: 20px 0; z-index: 100; }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-serif); font-size: 1.5rem; text-decoration: none; color: var(--text-main); font-weight: 700; }
        
        .internal-nav { display: flex; gap: 15px; align-items: center; font-family: var(--font-sans); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
        .internal-nav a { text-decoration: none; color: var(--text-muted); transition: 0.3s; }
        .internal-nav a:hover { color: var(--accent); }
        .internal-nav .active { color: var(--text-main); font-weight: 600; }
        .internal-nav .sep { color: var(--border-color); }

        .page-header { padding: 200px 0 80px 0; text-align: center; border-bottom: 1px solid var(--border-color); }
        .room-tag { font-family: var(--font-sans); font-size: 0.7rem; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; display: block; }
        .room-title { font-family: var(--font-serif); font-size: clamp(3rem, 10vw, 5.5rem); font-weight: 400; line-height: 1.1; }

        /* YAZI LİSTESİ */
        .writing-list { padding: 80px 0 150px 0; }
        
        .writing-item { 
            margin-bottom: 100px; 
            opacity: 0; 
            transform: translateY(30px); 
            animation: fadeUp 1s ease forwards;
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .w-meta { font-family: var(--font-sans); font-size: 0.75rem; letter-spacing: 2px; color: var(--accent); margin-bottom: 15px; display: block; text-transform: uppercase; }
        .w-title { font-family: var(--font-serif); font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 400; margin-bottom: 25px; line-height: 1.3; transition: 0.3s; }
        .writing-item:hover .w-title { color: var(--accent); font-style: italic; }

        .w-excerpt { font-size: 1.15rem; line-height: 1.9; color: var(--text-main); opacity: 0.85; font-weight: 300; margin-bottom: 30px; }
        
        .w-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px dashed var(--border-color); }
        .w-date { font-size: 0.8rem; color: var(--text-muted); font-family: var(--font-sans); letter-spacing: 1px; }
        
        /* GÜNCELLEME: BUTON STİLİ */
        .read-more { background: none; border: none; font-family: var(--font-sans); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-main); font-weight: 600; padding-bottom: 2px; border-bottom: 1px solid var(--accent); transition: 0.3s; }
        .read-more:hover { color: var(--accent); border-bottom-color: transparent; }

        .loading-text { text-align: center; padding: 100px 0; font-family: var(--font-sans); letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }

        /* GÜNCELLEME: TAM METİN OKUMA EKRANI (MODAL) */
        #reading-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--bg-color); z-index: 9999; overflow-y: auto; display: none; opacity: 0; transition: opacity 0.5s ease; padding: 100px 4vw; }
        #reading-modal.active { display: block; opacity: 1; }
        .reading-container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 80px 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.03); border: 1px solid var(--border-color); position: relative; }
        #close-reading { position: absolute; top: 30px; right: 30px; background: none; border: none; font-family: var(--font-sans); font-size: 0.8rem; letter-spacing: 2px; color: var(--text-muted); transition: 0.3s; }
        #close-reading:hover { color: #d9534f; }
        #read-title { font-family: var(--font-serif); font-size: 3rem; margin-bottom: 10px; line-height: 1.2; font-weight: 400; color: var(--text-main); }
        #read-meta { font-family: var(--font-sans); font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; display: block; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        #read-content { font-size: 1.15rem; line-height: 2; color: var(--text-main); font-weight: 300; white-space: pre-wrap; }

        @media (max-width: 768px) {
            .page-header { padding: 160px 0 50px 0; }
            .w-title { font-size: 1.8rem; }
            .internal-nav { font-size: 0.7rem; gap: 10px; }
            .reading-container { padding: 40px 20px; border: none; box-shadow: none; background: transparent; }
            #read-title { font-size: 2.2rem; }
            #read-content { font-size: 1.05rem; }
            #close-reading { top: 10px; right: 10px;}
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    
    <nav>
        <div class="container nav-inner">
            <a href="index.html" class="logo hover-target">YK.</a>
            <div class="internal-nav">
                <a href="sentez.html" class="hover-target">Sentez</a>
                <span class="sep">/</span>
                <span class="active">Perspektif</span>
                <span class="sep">/</span>
                <a href="doku.html" class="hover-target">Doku</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <span class="room-tag">Bölüm 02 &mdash; Felsefe & Gözlem</span>
            <h1 class="room-title">Perspektif.</h1>
        </header>

        <section class="writing-list" id="dynamic-writings">
            <div class="loading-text">Düşünceler Toplanıyor...</div>
        </section>
    </main>

    <div id="reading-modal">
        <div class="reading-container">
            <button id="close-reading" class="hover-target">KAPAT ✕</button>
            <h2 id="read-title">Başlık</h2>
            <span id="read-meta">Kategori - Tarih</span>
            <div id="read-content">İçerik buraya gelecek...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4",
            authDomain: "yk-blog-9720b.firebaseapp.com",
            projectId: "yk-blog-9720b",
            messagingSenderId: "863054301539",
            appId: "1:863054301539:web:4256589fbef613bd0e6b56"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadWritings() {
            const container = document.getElementById('dynamic-writings');
            try {
                const q = query(collection(db, "perspektif"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                container.innerHTML = '';

                if(snap.empty) {
                    container.innerHTML = '<div class="loading-text">Bu odada henüz bir düşünce paylaşılmadı.</div>';
                    return;
                }

                snap.forEach(doc => {
                    const data = doc.data();
                    
                    // GÜNCELLEME: Article elementi olarak oluşturup click eventi ekliyoruz
                    const article = document.createElement('article');
                    article.className = 'writing-item';
                    
                    article.innerHTML = `
                        <span class="w-meta">${data.type || 'Deneme'}</span>
                        <h2 class="w-title hover-target">${data.title}</h2>
                        <p class="w-excerpt">${data.excerpt}</p>
                        <div class="w-footer">
                            <span class="w-date">${data.date || '—'}</span>
                            <button class="read-more hover-target">Tamamını Oku &rarr;</button>
                        </div>
                    `;

                    // GÜNCELLEME: Okuma Ekranını Açma İşlemi
                    const readButton = article.querySelector('.read-more');
                    const titleClick = article.querySelector('.w-title');
                    
                    const openModal = () => {
                        document.getElementById('read-title').innerText = data.title;
                        document.getElementById('read-meta').innerText = `${data.type || 'Deneme'} — ${data.date || ''}`;
                        // Eğer eski bir yazıysa ve content (tam metin) yoksa excerpt (özet) gösterilsin
                        document.getElementById('read-content').innerText = data.content || data.excerpt + "\n\n(Bu yazının tam metni arşivde bulunamadı.)";
                        
                        document.body.style.overflow = 'hidden'; // Arka plan kaydırmayı kapat
                        document.getElementById('reading-modal').classList.add('active');
                    };

                    readButton.onclick = openModal;
                    titleClick.onclick = openModal; // Başlığa tıklayınca da açılsın

                    container.appendChild(article);
                });

                // İmleç etkisini güncelle (Sadece Masaüstü İçin)
                if (window.matchMedia("(pointer: fine)").matches) {
                    const cursor = document.getElementById('custom-cursor');
                    document.querySelectorAll('.hover-target').forEach(t => {
                        t.addEventListener('mouseover', () => cursor.classList.add('hover'));
                        t.addEventListener('mouseout', () => cursor.classList.remove('hover'));
                    });
                }

            } catch (e) { 
                container.innerHTML = '<div class="loading-text">Bağlantı Hatası.</div>';
            }
        }
        loadWritings();

        // GÜNCELLEME: Okuma Ekranını Kapatma
        document.getElementById('close-reading').addEventListener('click', () => {
            document.getElementById('reading-modal').classList.remove('active');
            document.body.style.overflow = 'auto'; // Kaydırmayı geri aç
        });

        // GÜNCELLEME: HIZLI İMLEÇ TAKİBİ
        if (window.matchMedia("(pointer: fine)").matches) {
            const cursor = document.getElementById('custom-cursor');
            document.addEventListener('mousemove', e => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        }
    </script>
</body>
</html>
