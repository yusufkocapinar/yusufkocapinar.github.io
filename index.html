<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf Kocapınar | Dijital Arşiv</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body>

    <header class="smart-header" id="header">
        <div class="logo">YK.</div>
        <a href="admin.html" class="btn-aksiyon">Yönetim</a>
    </header>

    <main class="vitrin-container">
        <section class="hero-section">
            <h1 class="hero-title">Manifesto & Perspektif.</h1>
            <p class="hero-subtitle">Düşünceler, denemeler ve edebi izler.</p>
        </section>

        <section id="yazi-akisi" class="yazi-akisi">
            <div class="loading-text">Arşiv Taranıyor...</div>
            </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <span class="footer-logo">YK.</span>
            
            <div class="footer-social">
                <a href="#" target="_blank" class="social-link">Instagram</a>
                <a href="#" target="_blank" class="social-link">LinkedIn</a>
                <a href="mailto:mail@adresin.com" class="social-link">E-posta</a>
            </div>

            <p class="footer-text">© 2026 Yusuf Kocapınar. Tüm edebi hakları saklıdır.</p>
        </div>
    </footer>

    <script>
        // Firebase Yapılandırması
        const firebaseConfig = {
            apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4",
            authDomain: "yk-blog-9720b.firebaseapp.com",
            projectId: "yk-blog-9720b",
            messagingSenderId: "863054301539",
            appId: "1:863054301539:web:4256589fbef613bd0e6b56"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.firestore();

        // AKILLI (SMART STICKY) HEADER MANTIĞI
        let lastScrollTop = 0;
        const header = document.getElementById("header");
        
        window.addEventListener("scroll", function() {
            let currentScroll = window.pageYOffset || document.documentElement.scrollTop;
            if (currentScroll > lastScrollTop) {
                header.style.transform = "translateY(-100%)";
            } else {
                header.style.transform = "translateY(0)";
            }
            lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;
        }, false);

        // İÇERİKLERİ VİTRİNE ÇEKME VE LİSTELEME
        const yaziAkisiDOM = document.getElementById('yazi-akisi');

        function vitrinIcerikleriniGetir() {
            db.collection("perspektif").orderBy("eklenmeTarihi", "desc").onSnapshot((snapshot) => {
                yaziAkisiDOM.innerHTML = '';
                
                if (snapshot.empty) {
                    yaziAkisiDOM.innerHTML = '<p class="loading-text">Henüz bir edebi iz bırakılmadı.</p>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const yazi = doc.data();
                    const isFeaturedClass = yazi.isFeatured ? "featured-post" : "";
                    const yildizIkon = yazi.isFeatured ? '<span class="featured-star">★</span>' : '';
                    
                    let tarihStr = "";
                    if(yazi.eklenmeTarihi && yazi.eklenmeTarihi.toDate) {
                        const dateObj = yazi.eklenmeTarihi.toDate();
                        tarihStr = dateObj.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric' });
                    }

                    const formatliIcerik = (yazi.icerik || "").split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');

                    yaziAkisiDOM.innerHTML += `
                        <article class="yazi-karti ${isFeaturedClass}">
                            <header class="yazi-header">
                                <h2 class="yazi-baslik">${yazi.baslik || yazi.title || "Başlıksız"} ${yildizIkon}</h2>
                                <span class="yazi-tarih">${tarihStr}</span>
                            </header>
                            <div class="yazi-icerik">
                                ${formatliIcerik}
                            </div>
                        </article>
                    `;
                });
            }, (error) => {
                console.error("Veritabanı okuma hatası: ", error);
                yaziAkisiDOM.innerHTML = '<p class="loading-text">İçerikler yüklenirken bir hata oluştu.</p>';
            });
        }

        vitrinIcerikleriniGetir();
    </script>
</body>
</html>
