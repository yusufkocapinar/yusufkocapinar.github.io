<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yusuf Kocapınar | Dijital Günlük</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="bg-image" id="bg-blur"></div>

    <button class="theme-switch" onclick="toggleTheme()"><i class="fas fa-sun"></i></button>

    <nav class="floating-nav">
        <a href="javascript:void(0)" onclick="closeAll()" class="nav-item active"><i class="fas fa-home"></i></a>
        <a href="javascript:void(0)" onclick="openModule('journal')" class="nav-item"><i class="fas fa-graduation-cap"></i></a>
        <a href="javascript:void(0)" onclick="openModule('gallery')" class="nav-item"><i class="fas fa-camera"></i></a>
    </nav>

    <div id="main-stage">
        <section id="home">
            <div class="hero-glass">
                <h1>Yusuf Kocapınar</h1>
                <p class="subtitle">Dijital Günlük</p>
            </div>
        </section>
    </div>

    <div id="module-journal" class="full-page-module">
        <div class="module-header">
            <h2 class="module-title">Günlük</h2>
            <button class="back-btn" onclick="history.back()">Geri Dön</button>
        </div>
        <div id="blog-grid" class="module-content"></div>
    </div>

    <div id="reader-overlay" class="reader-overlay">
        <div class="reader-content">
            <button class="back-btn" onclick="history.back()"><i class="fas fa-chevron-left"></i> Geri</button>
            <div id="reader-data"></div>
        </div>
    </div>

    <script>
        const data = {
            blog: [
                {
                    id: 1,
                    title: "21. Yaşımdan Notlar",
                    date: "9 Mart 2026",
                    content: `<blockquote>“Dostlar ki bir kere bile selamlaşmadık<br>Aynı ekmek, aynı hürriyet, aynı hasret için ölebiliriz.”</blockquote>Nazım’ın bu ihtişamlı sözleriyle başlıyorum mektubuma...<br><br>Yoldayım. Yolum uzun.`
                }
            ]
        };

        // --- NAVİGASYON VE GERİ TUŞU YÖNETİMİ ---
        function openModule(id) {
            history.pushState({view: 'module', id: id}, null, `#${id}`);
            renderModule(id);
        }

        function openReader(blogId) {
            const post = data.blog.find(b => b.id === blogId);
            history.pushState({view: 'reader', id: blogId}, null, `#reader-${blogId}`);
            renderReader(post);
        }

        function renderModule(id) {
            document.getElementById('main-stage').style.display = 'none';
            document.querySelectorAll('.full-page-module').forEach(m => m.classList.remove('active'));
            document.getElementById('module-' + id).classList.add('active');
            document.getElementById('reader-overlay').classList.remove('active');
        }

        function renderReader(post) {
            const container = document.getElementById('reader-data');
            container.innerHTML = `
                <div class="reader-header">
                    <span style="color:var(--accent-color); font-weight:600;">${post.date}</span>
                    <h1 class="reader-title">${post.title}</h1>
                </div>
                <div class="reader-body">${post.content}</div>
            `;
            document.getElementById('reader-overlay').classList.add('active');
        }

        function closeAll() {
            document.getElementById('main-stage').style.display = 'block';
            document.querySelectorAll('.full-page-module').forEach(m => m.classList.remove('active'));
            document.getElementById('reader-overlay').classList.remove('active');
            window.scrollTo(0,0);
        }

        // GERİ TUŞU ENTEGRASYONU (BRAWSWER BACK BUTTON)
        window.onpopstate = function(event) {
            if (!event.state) {
                closeAll();
            } else if (event.state.view === 'module') {
                renderModule(event.state.id);
            } else if (event.state.view === 'reader') {
                const post = data.blog.find(b => b.id === event.state.id);
                renderReader(post);
            }
        };

        // YAZILARI LİSTELE
        window.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('blog-grid');
            data.blog.forEach(post => {
                grid.innerHTML += `
                    <div class="academy-card" onclick="openReader(${post.id})">
                        <div style="font-size:0.7rem; color:var(--accent-color); font-weight:bold;">${post.date}</div>
                        <h3 style="font-family:'Cormorant Garamond', serif; font-size:1.8rem; margin:10px 0;">${post.title}</h3>
                        <p style="opacity:0.7; font-size:0.9rem;">Yazının devamı için tıkla...</p>
                    </div>`;
            });
        });

        function toggleTheme() { document.body.classList.toggle('purple-mode'); }
    </script>
</body>
</html>
