<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf Kocapınar | Dijital Arşiv</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Tenor+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Mermer ve Kemik Beyazı Tonları */
            --bg-color: #F5F5F3;
            --card-bg: #FFFFFF;         
            --text-main: #2C2A29;      
            --text-muted: #7A7A7A;
            /* Mat Bronz Detaylar */
            --accent: #B39B78;
            --border-color: rgba(179, 155, 120, 0.2); 
            --transition-premium: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Tenor Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
        }

        /* DOKU: Kağıt/Taş Pürüzü - Premium Hissiyat İçin Korundu */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.025"/></svg>');
            pointer-events: none; z-index: 50;
        }

        #custom-cursor {
            position: fixed; width: 6px; height: 6px; background: var(--accent);
            border-radius: 50%; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s, opacity 0.3s;
        }
        #custom-cursor.hover { width: 40px; height: 40px; background: rgba(179, 155, 120, 0.05); border: 1px solid var(--accent); opacity: 1; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 4vw; position: relative; z-index: 10; }

        /* ANA MENÜ: Oturaklı ve Planlı Mimari */
        nav {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 40px 0; z-index: 100; transition: var(--transition-premium);
            border-top: 6px solid var(--text-main); /* Tasarımı yere basan güçlü bir hat */
            background: linear-gradient(to bottom, rgba(245, 245, 243, 0.95) 0%, rgba(245, 245, 243, 0) 100%);
        }
        nav.scrolled {
            background: rgba(245, 245, 243, 0.98); backdrop-filter: blur(12px);
            padding: 25px 0; border-bottom: 1px solid var(--border-color);
            border-top: 6px solid var(--accent);
        }

        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; text-decoration: none; color: var(--text-main); }
        .nav-links { display: flex; gap: 45px; align-items: center; }
        .nav-links a { 
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2.5px; 
            color: var(--text-muted); text-decoration: none; transition: 0.3s; 
            position: relative; padding-bottom: 5px;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px;
            background-color: var(--accent); transition: width 0.3s ease;
        }
        .nav-links a.active, .nav-links a:hover { color: var(--text-main); }
        .nav-links a.active::after, .nav-links a:hover::after { width: 100%; }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .main-title {
            font-family: var(--font-serif); font-size: clamp(3rem, 8vw, 7rem);
            line-height: 1.1; font-weight: 400; letter-spacing: -1.5px;
            color: var(--text-main); text-align: center;
        }
        
        .hero-desc { font-size: 1.1rem; color: var(--text-muted); font-weight: 300; margin-top: 30px; text-transform: uppercase; letter-spacing: 4px; text-align: center; }

        section { padding: 120px 0; }
        .section-header { text-align: center; margin-bottom: 80px; }
        .section-tag { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); margin-bottom: 20px; display: block; }
        h2 { font-family: var(--font-serif); font-size: 2.5rem; font-weight: 400; color: var(--text-main); }

        /* BENTO GRID SİSTEMİ */
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 30px; }
        .bento-item {
            background: var(--card-bg); padding: 50px; text-decoration: none; color: inherit;
            border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); 
            transition: var(--transition-premium); display: flex; flex-direction: column; justify-content: space-between;
            position: relative; overflow: hidden;
        }
        .bento-item:hover { 
            transform: translateY(-8px); 
            border-color: rgba(179, 155, 120, 0.4); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06); 
        }
        .item-8 { grid-column: span 8; min-height: 380px; }
        .item-4 { grid-column: span 4; min-height: 380px; }
        .item-meta { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 15px; }
        .item-title { font-family: var(--font-serif); font-size: 2rem; font-weight: 400; margin-bottom: 15px; }
        .item-desc { color: var(--text-muted); font-size: 0.95rem; }
        .item-icon { position: absolute; bottom: 50px; right: 50px; font-size: 1.5rem; color: var(--border-color); transition: var(--transition-premium); }
        .bento-item:hover .item-icon { color: var(--accent); transform: scale(1.1); }

        .fade-up { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 900px) {
            .nav-links { display: none; }
            .bento-item { grid-column: span 12; }
            nav { border-top: 4px solid var(--text-main); padding: 25px 0; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    
    <nav id="main-nav">
        <div class="container nav-inner">
            <a href="#" class="logo hover-target">YK.</a>
            <div class="nav-links">
                <a href="#projects" class="hover-target">Projeler</a>
                <a href="#archive" class="hover-target active">Arşiv</a>
                <a href="#about" class="hover-target">Hakkında</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero container">
            <div class="title-wrapper">
                <span class="section-tag fade-up">© 2026 / İstanbul</span>
                <h1 class="main-title fade-up">Digital<br>Archive.</h1>
                <p class="hero-desc fade-up">Sentez &middot; Perspektif &middot; Doku</p>
            </div>
        </section>

        <section id="projects" class="container">
            <div class="section-header fade-up">
                <span class="section-tag">Seçkiler</span>
                <h2>Öne Çıkan Çalışmalar</h2>
            </div>
            <div class="bento-grid">
                <a href="#" class="bento-item item-8 fade-up hover-target">
                    <div>
                        <div class="item-meta">Araştırma & Geliştirme</div>
                        <h3 class="item-title">Onkosklepios: Karar Destek</h3>
                        <p class="item-desc">Likit biyopsi ve sanal patoloji analiz platformu.</p>
                    </div>
                    <div class="item-icon"><i class="fas fa-microscope"></i></div>
                </a>
                <a href="#" class="bento-item item-4 fade-up hover-target">
                    <div>
                        <div class="item-meta">Yazılım</div>
                        <h3 class="item-title">Sinyal İşleme</h3>
                        <p class="item-desc">MATLAB veri modelleme ve analiz süreçleri.</p>
                    </div>
                    <div class="item-icon"><i class="fas fa-code"></i></div>
                </a>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cursor = document.getElementById('custom-cursor');
            
            // Custom Cursor Logic
            document.addEventListener('mousemove', e => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
            
            document.querySelectorAll('.hover-target, a').forEach(t => {
                t.addEventListener('mouseover', () => cursor.classList.add('hover'));
                t.addEventListener('mouseout', () => cursor.classList.remove('hover'));
            });

            // Navigation Scroll Effect
            const nav = document.getElementById('main-nav');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    nav.classList.add('scrolled');
                } else {
                    nav.classList.remove('scrolled');
                }
            });

            // Fade Up Animation Observer
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => { 
                    if (e.isIntersecting) {
                        e.target.classList.add('visible'); 
                    }
                });
            }, { threshold: 0.1 });
            
            document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
