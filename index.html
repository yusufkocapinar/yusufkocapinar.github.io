<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf Kocapınar | Dijital Arşiv & Blog</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2275%22 font-family=%22'Playfair Display', serif%22 font-size=%2280%22 font-weight=%22bold%22 fill=%22%232C2A29%22>YK.</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Tenor+Sans&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #F5F5F3;
            --card-bg: #FFFFFF;         
            --text-main: #2C2A29;      
            --text-muted: #7A7A7A;
            --accent: #B39B78;
            --border-color: rgba(179, 155, 120, 0.2); 
            --transition-premium: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Tenor Sans', sans-serif;
            --font-signature: 'Great Vibes', cursive;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
            padding-top: 80px; /* Header boşluğu */
        }

        body.no-scroll { overflow: hidden; }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.025"/></svg>');
            pointer-events: none; z-index: 50;
        }

        @media (pointer: fine) {
            * { cursor: none; }
            #custom-cursor {
                position: fixed; width: 6px; height: 6px; background: var(--accent);
                border-radius: 50%; pointer-events: none; z-index: 10000;
                transform: translate(-50%, -50%); transition: width 0.15s ease-out, height 0.15s ease-out, background 0.15s ease-out;
            }
            #custom-cursor.hover { width: 40px; height: 40px; background: rgba(179, 155, 120, 0.05); border: 1px solid var(--accent); opacity: 1; }
        }
        @media (pointer: coarse) {
            #custom-cursor { display: none !important; }
            * { cursor: auto !important; }
        }

        *:focus-visible { outline: 1px dashed var(--accent); outline-offset: 4px; }

        .container { max-width: 850px; margin: 0 auto; padding: 0 5vw; position: relative; z-index: 10; }

        /* SABİT, TAM GENİŞLİK HEADER */
        .fixed-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            background: rgba(245, 245, 243, 0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5vw; z-index: 1000; transition: var(--transition-premium);
        }

        .header-brand {
            font-family: var(--font-signature); font-size: 2.2rem; 
            color: var(--text-main); text-decoration: none; 
            transform: rotate(-3deg);
        }

        .header-nav { display: flex; gap: 30px; align-items: center; }
        .header-nav a {
            font-family: var(--font-sans); font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 2px; color: var(--text-muted); text-decoration: none; transition: 0.3s;
        }
        .header-nav a:hover { color: var(--accent); }

        .auth-icon { color: var(--border-color); font-size: 1rem; transition: 0.3s; }
        .auth-icon:hover { color: var(--accent); }

        /* GİRİŞ (HAKKIMDA) BÖLÜMÜ */
        .intro-section { padding: 100px 0 80px 0; border-bottom: 1px solid var(--border-color); }
        .about-quote { font-family: var(--font-serif); font-style: italic; font-size: 1.6rem; color: var(--accent); line-height: 1.5; border-left: 2px solid var(--accent); padding-left: 25px; margin-bottom: 40px; }
        .about-text { font-size: 1.1rem; line-height: 1.9; color: var(--text-main); font-weight: 300; }
        .about-text p { margin-bottom: 20px; }
        .about-text strong { font-weight: 500; color: var(--accent); }

        /* KÜLLİYAT (LİSTE) BÖLÜMÜ */
        .archive-section { padding: 80px 0 100px 0; }
        
        .journal-item { 
            text-align: center; padding: 60px 0; border-bottom: 1px dashed var(--border-color); 
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer; outline: none; display: block; text-decoration: none;
        }
        .journal-item:last-child { border-bottom: none; }
        .journal-item:hover, .journal-item:focus-visible { transform: translateY(-5px); }

        .j-meta { font-family: var(--font-sans); font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 20px; display: flex; justify-content: center; gap: 15px; align-items: center; text-transform: uppercase; }
        .j-meta span.sep { color: var(--border-color); }
        
        .j-title { font-family: var(--font-serif); font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 400; margin-bottom: 20px; line-height: 1.2; color: var(--text-main); transition: 0.3s; }
        .journal-item:hover .j-title, .journal-item:focus-visible .j-title { color: var(--accent); font-style: italic; }

        .j-excerpt { font-size: 1.05rem; line-height: 1.8; color: var(--text-muted); font-weight: 300; margin-bottom: 25px; max-width: 650px; margin-left: auto; margin-right: auto; }
        
        .read-more { display: inline-block; font-family: var(--font-sans); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-main); border-bottom: 1px solid var(--accent); padding-bottom: 2px; font-weight: 600; transition: 0.3s; }
        .journal-item:hover .read-more { color: var(--accent); border-bottom-color: transparent; }

        .fade-up { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        /* PENCERELER (MODALS) */
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--bg-color); z-index: 9999; overflow-y: auto; display: none; opacity: 0; transition: opacity 0.4s ease; padding: 60px 4vw; }
        .full-modal.active { display: block; opacity: 1; }
        
        .reading-container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 80px 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.03); border: 1px solid var(--border-color); position: relative; }
        .image-container { max-width: 90%; max-height: 90vh; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; top: 50%; transform: translateY(-50%);}
        
        .close-modal-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; font-family: var(--font-sans); font-size: 0.8rem; letter-spacing: 2px; color: var(--text-muted); transition: 0.3s; padding: 10px; cursor: pointer; z-index: 10000; outline: none;}
        .close-modal-btn:hover, .close-modal-btn:focus-visible { color: #d9534f; }
        
        #read-title { font-family: var(--font-serif); font-size: 2.8rem; margin-bottom: 10px; line-height: 1.2; font-weight: 400; color: var(--text-main); }
        #read-meta { font-family: var(--font-sans); font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; display: block; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        #read-content { font-size: 1.15rem; line-height: 2; color: var(--text-main); font-weight: 300; white-space: pre-wrap; }
        
        #img-display { max-height: 70vh; max-width: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.15); margin-bottom: 25px; object-fit: contain; }
        #img-title { font-family: var(--font-serif); font-size: 2.2rem; margin-bottom: 10px; font-weight: 400; color: var(--text-main); text-align: center;}
        #img-desc { font-family: var(--font-sans); font-size: 0.85rem; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; text-align: center;}

        /* FOOTER */
        .site-footer { border-top: 1px solid var(--border-color); padding: 60px 0; position: relative; z-index: 10; text-align: center; }
        .footer-socials { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .footer-socials a { color: var(--text-main); font-size: 1.2rem; transition: var(--transition-premium); }
        .footer-socials a:hover { color: var(--accent); transform: translateY(-3px); }
        .footer-text { font-family: var(--font-sans); font-size: 0.7rem; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; }

        @media (max-width: 768px) {
            .header-nav a { display: none; } /* Mobilde linkleri gizleyip sadeliği korur */
            .intro-section { padding: 60px 0; }
            .reading-container { padding: 50px 25px; border: none; box-shadow: none; background: transparent; }
            #read-title { font-size: 2rem; }
            .j-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <header class="fixed-header hover-target">
        <a href="#" class="header-brand" title="Başa Dön">Yusuf Kocapınar</a>
        <nav class="header-nav">
            <a href="#about" class="hover-target">Hakkımda</a>
            <a href="#archive" class="hover-target">Külliyat</a>
            <a href="login.html" class="auth-icon hover-target" title="Yönetim Paneli"><i class="fas fa-key"></i></a>
        </nav>
    </header>

    <main>
        <section id="about" class="intro-section container fade-up">
            <div class="about-quote" id="dynamic-quote">
                <i class="fas fa-circle-notch fa-spin" aria-hidden="true"></i> Bekleniyor...
            </div>
            <div class="about-text" id="dynamic-about">
                <i class="fas fa-circle-notch fa-spin" aria-hidden="true"></i> Metinler yükleniyor...
            </div>
        </section>

        <section id="archive" class="archive-section container fade-up">
            <div id="dynamic-latest">
                <div style="text-align: center; color: var(--accent); padding: 40px; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase;">
                    <i class="fas fa-circle-notch fa-spin" aria-hidden="true"></i> Kayıtlar Aranıyor...
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer container fade-up">
        <div class="footer-socials">
            <a href="mailto:yusufkocapinar92@gmail.com" class="hover-target" title="E-Posta Gönder"><i class="far fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/yusufkocapinar" target="_blank" rel="noopener noreferrer" class="hover-target" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://instagram.com/kpyusufi" target="_blank" rel="noopener noreferrer" class="hover-target" title="Instagram"><i class="fab fa-instagram"></i></a>
        </div>
        <div class="footer-text">YK. Dijital Arşiv</div>
    </footer>

    <div id="text-modal" class="full-modal" role="dialog" aria-modal="true" aria-labelledby="read-title">
        <div class="reading-container">
            <button class="close-modal-btn hover-target" onclick="closeModals()" tabindex="0">KAPAT ✕</button>
            <h2 id="read-title">Başlık</h2>
            <span id="read-meta">Kategori</span>
            <div id="read-content">İçerik buraya gelecek...</div>
        </div>
    </div>

    <div id="image-modal" class="full-modal" style="background: rgba(245,245,243,0.98);" role="dialog" aria-modal="true" aria-labelledby="img-title">
        <button class="close-modal-btn hover-target" onclick="closeModals()" tabindex="0">KAPAT ✕</button>
        <div class="image-container">
            <img id="img-display" src="" alt="">
            <h2 id="img-title"></h2>
            <p id="img-desc"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4", authDomain: "yk-blog-9720b.firebaseapp.com", projectId: "yk-blog-9720b", messagingSenderId: "863054301539", appId: "1:863054301539:web:4256589fbef613bd0e6b56" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.closeModals = () => {
            document.getElementById('text-modal').classList.remove('active');
            document.getElementById('image-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        function openItemModal(data) {
            document.body.style.overflow = 'hidden';
            if (data.collectionName === 'doku') {
                const imgModal = document.getElementById('image-modal');
                document.getElementById('img-display').src = data.imageUrl;
                document.getElementById('img-display').alt = data.title;
                document.getElementById('img-title').innerText = data.title;
                document.getElementById('img-desc').innerText = [data.category, data.year].filter(Boolean).join(' — ') || '';
                imgModal.classList.add('active');
                imgModal.querySelector('.close-modal-btn').focus();
            } else {
                const textModal = document.getElementById('text-modal');
                document.getElementById('read-title').innerText = data.title;
                let metaText = data.collectionName === 'sentez' ? `${data.category || 'Proje'} — ${data.year || ''}` : `${data.type || 'Deneme'} — ${data.date || ''}`;
                document.getElementById('read-meta').innerText = metaText;
                document.getElementById('read-content').innerHTML = data.content || data.excerpt + "\n\n(Bu içeriğin tam metni arşivde bulunamadı.)";
                textModal.classList.add('active');
                textModal.querySelector('.close-modal-btn').focus();
            }
        }

        const defaultQuote = '"Ben öyle bilirim ki, yaşamak berrak bir gökte çocuklar aşkına savaşmaktır."';
        const defaultAbout = '<p><strong>Ben Yusuf.</strong> Hakikati aramanın, doğruyu bulmanın inceliğine meftunum.</p>';

        async function loadDynamicTexts() {
            const quoteEl = document.getElementById('dynamic-quote');
            const aboutEl = document.getElementById('dynamic-about');
            try {
                const docSnap = await getDoc(doc(db, "settings", "home_page"));
                if (docSnap.exists()) {
                    quoteEl.innerText = docSnap.data().quoteText || defaultQuote;
                    aboutEl.innerHTML = docSnap.data().aboutText || defaultAbout;
                } else {
                    quoteEl.innerText = defaultQuote; aboutEl.innerHTML = defaultAbout;
                }
            } catch (e) {
                quoteEl.innerText = defaultQuote; aboutEl.innerHTML = defaultAbout;
            }
        }

        async function loadUnifiedFeed() {
            const container = document.getElementById('dynamic-latest');
            try {
                const collectionsToSearch = ['sentez', 'perspektif', 'doku'];
                let allItems = [];

                for (const collName of collectionsToSearch) {
                    const snap = await getDocs(collection(db, collName));
                    snap.forEach(d => {
                        let data = d.data();
                        data.id = d.id;
                        data.collectionName = collName;
                        allItems.push(data);
                    });
                }

                allItems.sort((a, b) => {
                    const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                    const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                    return timeB - timeA;
                });

                container.innerHTML = '';
