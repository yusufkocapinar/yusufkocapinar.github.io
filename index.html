<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf Kocapınar | Dijital Arşiv</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tenor+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #F6F5F2;       /* Gerçek Mermer Tonu */
            --text-main: #1A1A1A;      
            --accent: #B39B78;         
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Tenor Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Mermer ve Kağıt Dokusu Overlay */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.05"/></svg>');
            pointer-events: none; z-index: 100;
        }

        /* HERO ART: Kaligrafik Kubbe ve Güvercin */
        .hero-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            z-index: 1; display: flex; align-items: center; justify-content: center;
            opacity: 0.25; /* Görünürlük ayarı */
            pointer-events: none;
        }

        .hero-canvas svg { width: 90%; max-width: 1200px; height: auto; }

        /* NAVİGASYON: Keskinlikten uzak, yumuşak menü */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; padding: 50px 0;
            z-index: 1000;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 5vw; }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        
        .logo { 
            font-family: var(--font-serif); font-size: 1.8rem; font-weight: 700; 
            letter-spacing: -1px; position: relative;
        }
        .logo::after { content: ""; position: absolute; bottom: -5px; left: 0; width: 100%; height: 1px; background: var(--accent); opacity: 0.4; }

        .nav-links { display: flex; gap: 60px; }
        .nav-links a {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 5px;
            color: var(--text-main); font-weight: 300; opacity: 0.6; transition: 0.5s;
        }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        /* HERO CONTENT */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative; z-index: 10;
        }
        .hero-meta { font-size: 0.75rem; letter-spacing: 10px; color: var(--accent); margin-bottom: 40px; }
        
        .main-title {
            font-family: var(--font-serif); font-size: clamp(4rem, 12vw, 9rem);
            font-weight: 700; line-height: 0.85; letter-spacing: -4px; text-align: center;
        }
        .main-title span { font-weight: 400; font-style: italic; opacity: 0.8; }

        .hero-desc {
            margin-top: 40px; font-size: 0.9rem; color: var(--text-main);
            letter-spacing: 6px; text-transform: uppercase; opacity: 0.7;
        }

        /* CURSOR */
        #cursor {
            position: fixed; width: 10px; height: 10px; background: var(--accent);
            border-radius: 50%; pointer-events: none; z-index: 10001;
            transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s;
        }
        #cursor.hover { width: 60px; height: 60px; background: rgba(179, 155, 120, 0.1); border: 0.5px solid var(--accent); }

        /* SECTION GEÇİŞİ */
        section { background: var(--bg-color); position: relative; z-index: 20; padding: 100px 0; }

        @media (max-width: 1000px) {
            .nav-links, .hero-canvas { display: none; }
            .main-title { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="hero-canvas">
        <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
            <!-- Kaligrafik Kubbetü's-Sahra Formu -->
            <path d="M200,400 Q200,380 220,380 L350,380 L350,320 C350,220 650,220 650,320 L650,380 L780,380 Q800,380 800,400" 
                  stroke="#B39B78" stroke-width="2.5" fill="none" stroke-linecap="round" />
            <path d="M350,380 L650,380 M400,380 L400,340 M450,380 L450,340 M550,380 L550,340 M600,380 L600,340" 
                  stroke="#B39B78" stroke-width="1" opacity="0.5" />
            <!-- Akışkan Hatlar -->
            <path d="M100,450 C250,450 300,300 500,300 C700,300 800,450 950,450" 
                  stroke="#2C2A29" stroke-width="0.5" fill="none" opacity="0.3" />
            <!-- Güvercin Formuna Uzanan Çizgi -->
            <path d="M650,250 C750,200 850,250 900,100" 
                  stroke="#B39B78" stroke-width="1.5" fill="none" stroke-dasharray="2 2" />
            <!-- Güvercin Silüeti -->
            <path d="M900,100 C910,80 940,85 950,110 C930,120 910,130 890,115 M900,100 L870,80 M900,100 L920,70" 
                  stroke="#B39B78" stroke-width="2" fill="none" />
        </svg>
    </div>

    <nav>
        <div class="container nav-inner">
            <a href="#" class="logo hover-target">YK.</a>
            <div class="nav-links">
                <a href="#" class="hover-target">Projeler</a>
                <a href="#" class="hover-target">Arşiv</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <p class="hero-meta">© 2026 / İSTANBUL</p>
            <h1 class="main-title">Digital<br><span>Archive.</span></h1>
            <p class="hero-desc">Fikirler &middot; Projeler &middot; Notlar</p>
        </section>

        <!-- Diğer içerikler buraya gelecek -->
        <section id="content" style="height: 100vh;"></section>
    </main>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('.hover-target').forEach(item => {
            item.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            item.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // Parallax etkisi (hafif)
        document.addEventListener('mousemove', e => {
            const art = document.querySelector('.hero-canvas svg');
            const x = (window.innerWidth - e.pageX * 2) / 100;
            const y = (window.innerHeight - e.pageY * 2) / 100;
            art.style.transform = `translateX(${x}px) translateY(${y}px)`;
        });
    </script>
</body>
</html>
