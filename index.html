<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y. Kocapınar | Külliyat</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2275%22 font-family=%22'Inter', sans-serif%22 font-size=%2280%22 font-weight=%22bold%22 fill=%22%231A1A1A%22>YK</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FAFAFA;     /* Kırık Beyaz / Göz Yormayan Zemin */
            --text-main: #1A1A1A;    /* Koyu Antrasit / Yüksek Kontrast */
            --text-muted: #666666;   /* İkincil Metinler */
            --border-color: #EAEAEA; /* İnce Sınır Çizgileri */
            --font-body: 'Lora', serif;
            --font-heading: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.8;
            font-size: 1.125rem;
            -webkit-font-smoothing: antialiased;
            overflow-y: scroll;
        }

        body.no-scroll { overflow: hidden; }

        h1, h2, h3, h4, nav, .meta {
            font-family: var(--font-heading);
        }

        /* Düzen: Tek Sütun ve 70 Karakter Sınırı */
        .container {
            max-width: 70ch;
            margin: 0 auto;
            padding: 0 5vw;
        }

        /* HEADER */
        header.site-header {
            padding: 50px 0 30px 0;
            margin-bottom: 50px;
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }
        nav { display: flex; gap: 25px; }
        nav a {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }
        nav a:hover { color: var(--text-main); }

        /* ANA AKIŞ - ÖNE ÇIKAN (SON YAZI) */
        main { min-height: 60vh; }
        
        .featured-article {
            margin-bottom: 80px;
            cursor: pointer;
        }
        .featured-article h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 500;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 15px;
            transition: color 0.3s;
        }
        .featured-article:hover h1 { color: #555; }
        .meta {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 25px;
            display: block;
        }
        .featured-article p {
            margin-bottom: 1.8em;
            color: var(--text-main);
        }

        /* LİSTE - DİĞER YAZILAR */
        .archive-section h2 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 0;
        }
        .archive-list { list-style: none; }
        .archive-item {
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            display: block;
            text-decoration: none;
            color: inherit;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .archive-item:hover { opacity: 0.6; }
        .archive-item h3 {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .archive-item p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0;
            line-height: 1.6;
        }
        .archive-meta {
            font-family: var(--font-heading);
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: block;
        }

        /* FOOTER */
        footer.site-footer {
            padding: 60px 0;
            text-align: center;
        }
        footer p {
            font-family: var(--font-heading);
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* OKUMA PENCERESİ (MODAL) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--bg-color); z-index: 9999;
            overflow-y: auto; display: none; opacity: 0; transition: opacity 0.4s ease;
        }
        .modal.active { display: block; opacity: 1; }
        
        .modal-container {
            max-width: 70ch;
            margin: 0 auto;
            padding: 80px 5vw 100px 5vw;
            position: relative;
        }
        .close-btn {
            position: fixed; top: 30px; right: 5vw;
            background: none; border: none; font-family: var(--font-heading);
            font-size: 0.8rem; letter-spacing: 1px; color: var(--text-muted);
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .close-btn:hover { color: var(--text-main); }
        
        #read-title {
            font-size: clamp(2rem, 5vw, 3.5rem); line-height: 1.1; letter-spacing: -1px;
            font-weight: 500; margin-bottom: 15px;
        }
        #read-meta { margin-bottom: 40px; }
        #read-content { white-space: pre-wrap; font-size: 1.125rem; line-height: 1.8; }
        #read-content p { margin-bottom: 1.8em; }
        
        #img-display { max-width: 100%; height: auto; margin-bottom: 30px; display: none; }

        /* LOADING */
        .loading-state { text-align: center; padding: 100px 0; font-family: var(--font-heading); font-size: 0.85rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">Y. Kocapınar</a>
            <nav>
                <a href="#archive-section">Arşiv</a>
                <a href="login.html">Giriş</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="dynamic-content">
            <div class="loading-state">Külliyat Yükleniyor...</div>
        </div>
    </main>

    <footer class="site-footer container">
        <p>&copy; 2026 Yusuf Kocapınar.</p>
    </footer>

    <div id="reading-modal" class="modal" role="dialog" aria-modal="true">
        <button class="close-btn" onclick="closeModal()">Kapat ✕</button>
        <div class="modal-container">
            <h1 id="read-title">Başlık</h1>
            <span class="meta" id="read-meta">Kategori - Tarih</span>
            <img id="img-display" src="" alt="Görsel">
            <div id="read-content"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4", authDomain: "yk-blog-9720b.firebaseapp.com", projectId: "yk-blog-9720b", messagingSenderId: "863054301539", appId: "1:863054301539:web:4256589fbef613bd0e6b56" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.closeModal = () => {
            document.getElementById('reading-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
            document.getElementById('img-display').style.display = 'none';
        };

        window.openArticle = (dataStr) => {
            const data = JSON.parse(decodeURIComponent(dataStr));
            document.body.style.overflow = 'hidden';
            
            document.getElementById('read-title').innerText = data.title;
            let metaText = data.collectionName === 'sentez' ? `${data.category || 'Proje'} • ${data.year || ''}` : 
                           data.collectionName === 'perspektif' ? `${data.type || 'Deneme'} • ${data.date || ''}` : 
                           `Doku (Galeri) • ${data.year || ''}`;
            document.getElementById('read-meta').innerText = metaText;
            
            const imgEl = document.getElementById('img-display');
            const contentEl = document.getElementById('read-content');
            
            if (data.collectionName === 'doku') {
                imgEl.src = data.imageUrl;
                imgEl.style.display = 'block';
                contentEl.innerHTML = data.desc || '';
            } else {
                imgEl.style.display = 'none';
                contentEl.innerHTML = data.content || data.excerpt || '';
            }
            
            document.getElementById('reading-modal').classList.add('active');
        };

        async function loadContent() {
            const container = document.getElementById('dynamic-content');
            try {
                const collections = ['sentez', 'perspektif', 'doku'];
                let allItems = [];

                for (const col of collections) {
                    const snap = await getDocs(collection(db, col));
                    snap.forEach(d => {
                        let data = d.data(); data.id = d.id; data.collectionName = col;
                        allItems.push(data);
                    });
                }

                allItems.sort((a, b) => (b.createdAt ? b.createdAt.toMillis() : 0) - (a.createdAt ? a.createdAt.toMillis() : 0));

                if (allItems.length === 0) {
                    container.innerHTML = '<div class="loading-state">Henüz içerik bulunmuyor.</div>';
                    return;
                }

                const featured = allItems[0];
                const rest = allItems.slice(1);
                
                let metaFeatured = featured.collectionName === 'sentez' ? `${featured.category || 'Proje'} • ${featured.year || ''}` : 
                                   featured.collectionName === 'perspektif' ? `${featured.type || 'Deneme'} • ${featured.date || ''}` : 
                                   `Doku • ${featured.year || ''}`;
                
                const fDataStr = encodeURIComponent(JSON.stringify(featured));
                
                let html = `
                    <article class="featured-article" onclick="openArticle('${fDataStr}')">
                        <h1>${featured.title}</h1>
                        <span class="meta">${metaFeatured}</span>
                        <p>${featured.excerpt || featured.desc || 'İçeriği okumak için tıklayın.'}</p>
                    </article>
                `;

                if (rest.length > 0) {
                    html += `
                        <section id="archive-section" class="archive-section">
                            <h2>Arşiv</h2>
                            <ul class="archive-list">
                    `;
                    rest.forEach(item => {
                        let metaItem = item.collectionName === 'sentez' ? `${item.year || ''}` : 
                                       item.collectionName === 'perspektif' ? `${item.date || ''}` : `${item.year || ''}`;
                        const iDataStr = encodeURIComponent(JSON.stringify(item));
                        html += `
                            <li class="archive-item" onclick="openArticle('${iDataStr}')">
                                <span class="archive-meta">${metaItem}</span>
                                <h3>${item.title}</h3>
                                <p>${item.excerpt || item.desc || ''}</p>
                            </li>
                        `;
                    });
                    html += `</ul></section>`;
                }
                
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<div class="loading-state" style="color:red;">Veriler yüklenirken bir hata oluştu.</div>';
            }
        }

        loadContent();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') window.closeModal();
        });
    </script>
</body>
</html>
