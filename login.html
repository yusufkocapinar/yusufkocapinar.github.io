<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş | Külliyat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAFAFA;
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --border-color: #EAEAEA;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Inter', sans-serif; display: flex; align-items: center;
            justify-content: center; height: 100vh;
        }
        .login-container { width: 100%; max-width: 400px; padding: 40px; }
        h1 { font-size: 2rem; font-weight: 500; margin-bottom: 10px; letter-spacing: -1px; }
        p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 40px; line-height: 1.6; }
        
        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }
        input { width: 100%; padding: 15px 0; border: none; border-bottom: 1px solid var(--border-color); background: transparent; font-size: 1rem; color: var(--text-main); outline: none; transition: border-color 0.3s; }
        input:focus { border-bottom-color: var(--text-main); }
        
        button { width: 100%; background: var(--text-main); color: #fff; border: none; padding: 18px 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: opacity 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.8; }
        
        .error-msg { color: #D32F2F; font-size: 0.8rem; margin-top: 15px; text-align: center; min-height: 1.2em; }
        .back { display: inline-block; margin-top: 40px; font-size: 0.8rem; color: var(--text-muted); text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        .back:hover { color: var(--text-main); }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Sisteme Giriş</h1>
        <p>Arşivi yönetmek için yetkili kimliğinizi doğrulayın.</p>
        
        <form id="login-form">
            <div class="input-group">
                <label for="email">E-Posta</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" id="submit-btn">Doğrula</button>
            <div class="error-msg" id="error-msg"></div>
        </form>
        
        <a href="index.html" class="back">← Vitrine Dön</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4", authDomain: "yk-blog-9720b.firebaseapp.com", projectId: "yk-blog-9720b", messagingSenderId: "863054301539", appId: "1:863054301539:web:4256589fbef613bd0e6b56" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => { if (user) window.location.href = 'admin.html'; });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const err = document.getElementById('error-msg');
            btn.textContent = 'Bekleyin...'; btn.disabled = true; err.textContent = '';
            
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                window.location.href = 'admin.html';
            } catch (error) {
                err.textContent = 'Kimlik doğrulama başarısız.';
                btn.textContent = 'Doğrula'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
