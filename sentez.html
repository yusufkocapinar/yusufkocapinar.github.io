<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentez | YK. Dijital Arşiv</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2275%22 font-family=%22'Playfair Display', serif%22 font-size=%2280%22 font-weight=%22bold%22 fill=%22%232C2A29%22>YK.</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Tenor+Sans&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #F5F5F3; --text-main: #2C2A29; --text-muted: #7A7A7A;
            --accent: #B39B78; --border-color: rgba(179, 155, 120, 0.2); 
            --font-serif: 'Playfair Display', serif; --font-sans: 'Tenor Sans', sans-serif;
            --font-signature: 'Great Vibes', cursive;
            --card-bg: #FFFFFF;
            --transition-premium: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        body.no-scroll { overflow: hidden; }

        /* KLAVYE ODAKLANMA (ACCESSIBILITY) */
        *:focus-visible { outline: 1px dashed var(--accent); outline-offset: 4px; }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.025"/></svg>'); pointer-events: none; z-index: 50; }

        @media (pointer: fine) {
            * { cursor: none; }
            #custom-cursor { position: fixed; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: width 0.15s ease-out, height 0.15s ease-out, background 0.15s ease-out; }
            #custom-cursor.hover { width: 40px; height: 40px; background: rgba(179, 155, 120, 0.1); border: 1px solid var(--accent); opacity: 1; }
        }
        @media (pointer: coarse) {
            #custom-cursor { display: none !important; }
            * { cursor: auto !important; }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 4vw; position: relative; z-index: 10; }

        header.top-nav {
            position: fixed; top: 0; left: 0; width: 100%; padding: 30px 4vw; z-index: 100;
            display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; 
        }
        .brand-group { display: flex; align-items: center; gap: 15px; pointer-events: auto; transition: var(--transition-premium); }
        .brand-group:hover { transform: scale(1.02); }
        .palestine-crest { height: 45px; width: auto; stroke: var(--accent); stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .logo-signature { font-family: var(--font-signature); font-size: 2.8rem; color: var(--text-main); text-decoration: none; line-height: 1; transform: rotate(-3deg); padding-top: 10px; }

        .header-controls { pointer-events: auto; background: rgba(245, 245, 243, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(179, 155, 120, 0.3); border-radius: 50px; display: flex; align-items: center; gap: 20px; padding: 6px 6px 6px 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: var(--transition-premium); }
        .header-controls:hover { border-color: var(--accent); background: rgba(245, 245, 243, 0.9); }
        .login-link { font-family: var(--font-sans); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); text-decoration: none; transition: 0.3s; }
        .login-link:hover { color: var(--accent); }
        .menu-toggle { background: var(--text-main); color: var(--bg-color); border: none; border-radius: 40px; padding: 12px 25px; font-family: var(--font-sans); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; transition: var(--transition-premium); }
        .menu-toggle:hover { background: var(--accent); transform: scale(1.05); }

        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-color: var(--bg-color); z-index: 999; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; clip-path: circle(0% at top right); transition: opacity 0.6s ease, visibility 0.6s ease, clip-path 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
        .menu-overlay.active { opacity: 1; visibility: visible; clip-path: circle(150% at top right); }
        .overlay-close { position: absolute; top: 30px; right: 4vw; font-family: var(--font-sans); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-main); background: none; border: none; z-index: 1000; padding: 10px; }
        
        .overlay-nav { display: flex; flex-direction: column; gap: 40px; text-align: center; }
        .overlay-link { font-family: var(--font-serif); font-size: clamp(3rem, 6vw, 5rem); color: var(--text-main); text-decoration: none; display: block; transform: translateY(30px); opacity: 0; transition: var(--transition-premium); }
        .overlay-link span { display: block; font-family: var(--font-sans); font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 4px; margin-top: 10px; }
        .menu-overlay.active .overlay-link { transform: translateY(0); opacity: 1; }
        .overlay-link:hover { color: var(--accent); }

        .page-header { padding: 180px 0 60px 0; border-bottom: 1px solid var(--border-color); text-align: center; margin-bottom: 60px;}
        .room-tag { font-family: var(--font-sans); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); margin-bottom: 20px; display: block; }
        .room-title { font-family: var(--font-serif); font-size: clamp(3.5rem, 8vw, 6rem); font-weight: 400; line-height: 1; }

        /* YENİ SENTEZ GRID TASARIMI */
        .project-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 40px; padding-bottom: 150px; 
        }
        
        .project-card { 
            background: rgba(255, 255, 255, 0.4); border: 1px solid var(--border-color); 
            padding: 40px; transition: var(--transition-premium); 
            display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s ease forwards;
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        
        .project-card:hover { transform: translateY(-8px); border-color: rgba(179, 155, 120, 0.6); background: var(--card-bg); box-shadow: 0 15px 30px rgba(0,0,0,0.03); }
        
        .card-header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-start; }
        .project-meta { font-family: var(--font-sans); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); }
        .project-year { font-family: var(--font-serif); font-size: 1.2rem; color: var(--text-muted); font-style: italic; }
        
        .project-content h2 { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 400; margin-bottom: 15px; line-height: 1.2; color: var(--text-main); transition: 0.3s; }
        .project-card:hover .project-content h2 { color: var(--accent); }
        .project-excerpt { font-size: 1rem; line-height: 1.7; color: var(--text-muted); margin-bottom: 30px; font-weight: 300; }

        .project-actions { display: flex; gap: 15px; align-items: center; margin-top: auto; }
        .read-more { background: none; border: none; font-family: var(--font-sans); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-main); padding-bottom: 2px; border-bottom: 1px solid var(--accent); font-weight: 600; transition: 0.3s; }
        .read-more:hover { color: var(--accent); border-bottom-color: transparent; }
        .project-link { font-family: var(--font-sans); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); text-decoration: none; transition: 0.3s; }
        .project-link:hover { color: var(--accent); }

        .loading-text { text-align: center; padding: 100px 0; font-family: var(--font-sans); letter-spacing: 3px; color: var(--accent); text-transform: uppercase; grid-column: 1 / -1;}

        /* MODAL EKRANI GÜNCELLEMELERİ (MOBİL İÇİN ÇARPI BÜYÜTÜLDÜ) */
        #reading-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--bg-color); z-index: 9999; overflow-y: auto; display: none; opacity: 0; transition: opacity 0.4s ease; padding: 60px 4vw; }
        #reading-modal.active { display: block; opacity: 1; }
        .reading-container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 80px 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.03); border: 1px solid var(--border-color); position: relative; }
        #close-reading { position: absolute; top: 20px; right: 20px; background: none; border: none; font-family: var(--font-sans); font-size: 0.8rem; letter-spacing: 2px; color: var(--text-muted); transition: 0.3s; padding: 10px; }
        #close-reading:hover { color: #d9534f; }
        #read-title { font-family: var(--font-serif); font-size: 2.8rem; margin-bottom: 10px; line-height: 1.2; font-weight: 400; color: var(--text-main); }
        #read-meta { font-family: var(--font-sans); font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; display: block; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        #read-content { font-size: 1.1rem; line-height: 2; color: var(--text-main); font-weight: 300; white-space: pre-wrap; }

        @media (max-width: 900px) {
            header.top-nav { padding: 20px 4vw; }
            .palestine-crest { height: 35px; }
            .logo-signature { font-size: 2.2rem; }
            .header-controls { padding: 5px 5px 5px 15px; gap: 15px; }
            .login-link { display: none; }
            .project-grid { grid-template-columns: 1fr; gap: 20px; }
            .reading-container { padding: 50px 25px; border: none; box-shadow: none; background: transparent; }
            #read-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    
    <div class="menu-overlay" id="overlay">
        <button class="overlay-close hover-target" tabindex="0" id="close-menu">Kapat ✕</button>
        <nav class="overlay-nav">
            <a href="index.html" class="overlay-link hover-target">Giriş <span>Ana Sayfa & Vitrin</span></a>
            <a href="perspektif.html" class="overlay-link hover-target">Perspektif <span>Entelektüel Denemeler</span></a>
            <a href="doku.html" class="overlay-link hover-target">Doku <span>Sanat & Estetik</span></a>
        </nav>
    </div>

    <header class="top-nav">
        <div class="brand-group hover-target">
            <svg class="palestine-crest" viewBox="0 0 100 200" title="Palestine">
                <path d="M45,5 L60,25 C65,40 60,70 55,100 L40,185 C35,195 25,195 20,185 L10,120 C5,90 15,45 45,5 Z"/>
            </svg>
            <a href="index.html" class="logo-signature">Y. Kocapınar</a>
        </div>
        <div class="header-controls">
            <a href="login.html" class="login-link hover-target">Giriş</a>
            <button class="menu-toggle hover-target" id="open-menu">Menü <i class="fas fa-bars"></i></button>
        </div>
    </header>

    <main class="container">
        <header class="page-header">
            <span class="room-tag">Bölüm 01 &mdash; Akademik & Teknik</span>
            <h1 class="room-title">Sentez.</h1>
        </header>

        <section class="project-grid" id="dynamic-projects">
            <div class="loading-text">Arşiv Taranıyor...</div>
        </section>
    </main>

    <div id="reading-modal" role="dialog" aria-modal="true">
        <div class="reading-container">
            <button id="close-reading" class="hover-target" tabindex="0">KAPAT ✕</button>
            <h2 id="read-title">Başlık</h2>
            <span id="read-meta">Kategori - Yıl</span>
            <div id="read-content">İçerik buraya gelecek...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4", authDomain: "yk-blog-9720b.firebaseapp.com", projectId: "yk-blog-9720b", messagingSenderId: "863054301539", appId: "1:863054301539:web:4256589fbef613bd0e6b56" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        async function loadProjects() {
            const container = document.getElementById('dynamic-projects');
            try {
                const q = query(collection(db, "sentez"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                container.innerHTML = '';

                if(snap.empty) { container.innerHTML = '<div class="loading-text">Henüz kayıtlı bir proje bulunamadı.</div>'; return; }

                snap.forEach(doc => {
                    const data = doc.data();
                    const article = document.createElement('article');
                    article.className = 'project-card';
                    article.setAttribute('tabindex', '0'); // Klavye ile odaklanılabilir
                    
                    const linkHTML = data.link ? `<a href="${data.link}" target="_blank" tabindex="0" class="project-link hover-target"><i class="fas fa-external-link-alt"></i> Dış Bağlantı</a>` : '';
                    
                    article.innerHTML = `
                        <div>
                            <div class="card-header">
                                <span class="project-meta">${data.category || 'Genel Proje'}</span>
                                <span class="project-year">${data.year || '—'}</span>
                            </div>
                            <div class="project-content">
                                <h2 class="hover-target">${data.title}</h2>
                                <p class="project-excerpt">${data.excerpt}</p>
                            </div>
                        </div>
                        <div class="project-actions">
                            <button class="read-more hover-target" tabindex="0">Detayları İncele</button>
                            ${linkHTML}
                        </div>
                    `;

                    const openModal = () => {
                        document.getElementById('read-title').innerText = data.title;
                        document.getElementById('read-meta').innerText = `${data.category || 'Genel Proje'} — ${data.year || ''}`;
                        document.getElementById('read-content').innerText = data.content || data.excerpt + "\n\n(Bu projenin tam detay metni arşivde bulunamadı.)";
                        document.body.style.overflow = 'hidden';
                        document.getElementById('reading-modal').classList.add('active');
                        document.getElementById('close-reading').focus(); // Ekran okuyucu odaklanması
                    };

                    article.querySelector('.read-more').onclick = openModal; 
                    article.querySelector('h2').onclick = openModal;
                    
                    // Klavye Enter ile açma desteği
                    article.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') openModal();
                    });

                    container.appendChild(article);
                });

                if (window.matchMedia("(pointer: fine)").matches) {
                    const cursor = document.getElementById('custom-cursor');
                    document.querySelectorAll('.hover-target').forEach(t => {
                        t.addEventListener('mouseover', () => cursor.classList.add('hover'));
                        t.addEventListener('mouseout', () => cursor.classList.remove('hover'));
                    });
                }
            } catch (e) { container.innerHTML = '<div class="loading-text">Bağlantı Hatası.</div>'; }
        }
        loadProjects();

        // Kapatma Fonksiyonları
        const closeModal = () => {
            document.getElementById('reading-modal').classList.remove('active');
            document.body.style.overflow = 'auto'; 
        }
        document.getElementById('close-reading').addEventListener('click', closeModal);

        const toggleMenu = () => { 
            const overlay = document.getElementById('overlay');
            overlay.classList.toggle('active'); 
            document.body.classList.toggle('no-scroll'); 
            if(overlay.classList.contains('active')) document.getElementById('close-menu').focus();
        };
        document.getElementById('open-menu').addEventListener('click', toggleMenu);
        document.getElementById('close-menu').addEventListener('click', toggleMenu);
        document.querySelectorAll('.overlay-link').forEach(link => { link.addEventListener('click', toggleMenu); });

        // KLAVYE (ESC) İLE KAPATMA
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if(document.getElementById('reading-modal').classList.contains('active')) closeModal();
                if(document.getElementById('overlay').classList.contains('active')) toggleMenu();
            }
        });

        if (window.matchMedia("(pointer: fine)").matches) {
            const cursor = document.getElementById('custom-cursor');
            document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
        }
    </script>
</body>
</html>
