<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim | YK. Dijital Arşiv</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="angular-header" style="position: static; margin-bottom: 50px;">
        <div class="logo-container">
            <a href="index.html" class="typo-logo">YK<span class="dot">.</span> Yönetim</a>
        </div>
        <nav class="nav-actions">
            <a href="index.html" class="angular-btn" style="border: none;">Vitrine Dön</a>
            <button id="logout-btn" class="angular-btn" style="display: none; border-color: #d9534f; color: #d9534f;">Çıkış Yap</button>
        </nav>
    </header>

    <main class="container" style="margin-top: 0;">
        
        <div id="login-section" class="admin-view active">
            <div class="feed-header"><h1 class="feed-title">Kimlik Doğrulama.</h1></div>
            <form id="login-form">
                <div class="input-group">
                    <label>E-Posta</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="angular-btn" style="width: 100%;">Kilidi Aç</button>
                <div id="error-msg" style="color: #d9534f; font-size: 0.8rem; margin-top: 15px; text-align: center;"></div>
            </form>
        </div>

        <div id="dashboard-section" class="admin-view">
            <div class="feed-header"><h1 class="feed-title">Yeni İçerik Ekle.</h1></div>
            <form id="post-form">
                <div class="input-group">
                    <label>Yazı Başlığı</label>
                    <input type="text" id="p-title" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="input-group">
                        <label>Tür</label>
                        <select id="p-type"><option>Deneme</option><option>Şiir</option><option>Eleştiri</option></select>
                    </div>
                    <div class="input-group">
                        <label>Tarih (Örn: Nisan 2026)</label>
                        <input type="text" id="p-date" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Özet (Listede Görünecek)</label>
                    <textarea id="p-excerpt" required style="min-height: 80px;"></textarea>
                </div>
                <div class="input-group">
                    <label>Tam Metin</label>
                    <textarea id="p-content" required style="min-height: 300px;"></textarea>
                </div>
                <button type="submit" class="angular-btn" style="width: 100%;">Arşive Kaydet</button>
            </form>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4", authDomain: "yk-blog-9720b.firebaseapp.com", projectId: "yk-blog-9720b" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginSec = document.getElementById('login-section');
        const dashSec = document.getElementById('dashboard-section');
        const logoutBtn = document.getElementById('logout-btn');

        // Oturum Kontrolü
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSec.classList.remove('active');
                dashSec.classList.add('active');
                logoutBtn.style.display = 'inline-block';
            } else {
                dashSec.classList.remove('active');
                loginSec.classList.add('active');
                logoutBtn.style.display = 'none';
            }
        });

        // Giriş Yapma
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Doğrulanıyor...";
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (err) {
                document.getElementById('error-msg').innerText = "Hatalı bilgi girdiniz.";
                btn.innerText = "Kilidi Aç";
            }
        });

        // Çıkış Yapma
        logoutBtn.addEventListener('click', () => signOut(auth));

        // Yazı Gönderme
        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const origText = btn.innerText;
            btn.innerText = "Kaydediliyor...";
            btn.disabled = true;
            try {
                await addDoc(collection(db, "perspektif"), {
                    title: document.getElementById('p-title').value,
                    type: document.getElementById('p-type').value,
                    date: document.getElementById('p-date').value,
                    excerpt: document.getElementById('p-excerpt').value,
                    content: document.getElementById('p-content').value,
                    createdAt: serverTimestamp()
                });
                e.target.reset();
                btn.innerText = "Başarıyla Eklendi!";
            } catch (err) { btn.innerText = "Hata Oluştu!"; }
            setTimeout(() => { btn.innerText = origText; btn.disabled = false; }, 2000);
        });
    </script>
</body>
</html>
