<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YK. | Yönetim</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script>
</head>
<body>

    <header class="smart-header">
        <div class="logo">YK.</div>
        <a href="index.html" class="btn-aksiyon">Vitrine Dön</a>
    </header>

    <main class="admin-container">
        <section id="login-section">
            <h1 class="admin-heading">Yönetim Girişi</h1>
            <input type="email" id="email" placeholder="E-posta" class="form-input">
            <input type="password" id="password" placeholder="Şifre" class="form-input">
            <button onclick="girisYap()" class="btn-aksiyon btn-primary">Giriş Yap</button>
        </section>

        <section id="dashboard-section" style="display: none;">
            
            <div class="admin-form-group">
                <h2 class="admin-heading">Yeni Eser Ekle</h2>
                <input type="text" id="yazi-baslik" placeholder="Başlık" class="form-input">
                <textarea id="yazi-icerik" placeholder="Metin..." class="form-textarea"></textarea>
                <button onclick="yaziEkle()" class="btn-aksiyon btn-primary">Yayınla</button>
            </div>

            <section id="icerik-yoneticisi" class="admin-section">
                <h2 class="admin-heading">Arşiv Yöneticisi</h2>
                <div class="table-header">
                    <span>Yazı Başlığı</span>
                    <span>Aksiyonlar</span>
                </div>
                <div id="admin-yazi-listesi">
                    </div>
            </section>
        </section>
    </main>

    <script>
        // Firebase Yapılandırmanı Buraya Ekle
        const firebaseConfig = {
            // apiKey: "...",
            // authDomain: "...",
            // projectId: "...",
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // AUTH KONTROLÜ
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-section').style.display = 'block';
                icerikleriGetir();
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('dashboard-section').style.display = 'none';
            }
        });

        function girisYap() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Hata: " + err.message));
        }

        function yaziEkle() {
            const baslik = document.getElementById('yazi-baslik').value;
            const icerik = document.getElementById('yazi-icerik').value;
            
            if(baslik && icerik) {
                db.collection("perspektif").add({
                    baslik: baslik,
                    icerik: icerik,
                    eklenmeTarihi: new Date(),
                    isFeatured: false
                }).then(() => {
                    alert("Yazı eklendi.");
                    document.getElementById('yazi-baslik').value = '';
                    document.getElementById('yazi-icerik').value = '';
                });
            }
        }

        // İÇERİK YÖNETİCİSİ FONKSİYONLARI
        const yaziListesiDOM = document.getElementById('admin-yazi-listesi');

        function icerikleriGetir() {
            db.collection("perspektif").orderBy("eklenmeTarihi", "desc").onSnapshot((snapshot) => {
                yaziListesiDOM.innerHTML = '';
                snapshot.forEach((doc) => {
                    const yazi = doc.data();
                    const id = doc.id;
                    const isFeaturedClass = yazi.isFeatured ? "yildizli" : "";
                    const yildizİkon = yazi.isFeatured ? "★" : "☆";

                    yaziListesiDOM.innerHTML += `
                        <div class="admin-yazi-satiri ${isFeaturedClass}">
                            <span class="yazi-baslik">${yazi.baslik || yazi.title || "Başlıksız"}</span>
                            <div class="aksiyon-butonlari">
                                <button onclick="yildizla('${id}', ${yazi.isFeatured})" class="btn-aksiyon btn-yildiz">${yildizİkon}</button>
                                <button onclick="yaziSil('${id}')" class="btn-aksiyon btn-sil">Sil</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        async function yildizla(id, mevcutDurum) {
            await db.collection("perspektif").doc(id).update({
                isFeatured: !mevcutDurum
            });
        }

        async function yaziSil(id) {
            if(confirm("Bu eseri arşivden kalıcı olarak silmek istediğine emin misin?")) {
                await db.collection("perspektif").doc(id).delete();
            }
        }

        // TEMİZLİK SCRİPTİ (Sadece bir kez çalıştırılmalı)
        async function veritabaniniTemizleVeTasi() {
            const eskiKoleksiyonlar = ["sentez", "doku"];
            for (const koleksiyon of eskiKoleksiyonlar) {
                const snapshot = await db.collection(koleksiyon).get();
                snapshot.forEach(async (doc) => {
                    const veri = doc.data();
                    if (veri.baslik === "21. Yaşımdan Notlar" || veri.title === "21. Yaşımdan Notlar") {
                        await db.collection("perspektif").add({
                            ...veri,
                            isFeatured: true,
                            eklenmeTarihi: veri.eklenmeTarihi || new Date()
                        });
                        console.log("💎 '21. Yaşımdan Notlar' taşındı.");
                    }
                    await db.collection(koleksiyon).doc(doc.id).delete();
                });
            }
            console.log("🧹 Temizlik tamamlandı.");
        }
    </script>
</body>
</html>
