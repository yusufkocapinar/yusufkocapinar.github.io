<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim | YK. Dijital Arşiv</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Tenor+Sans&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #F5F5F3; --card-bg: #FFFFFF; --text-main: #2C2A29;      
            --text-muted: #7A7A7A; --accent: #B39B78; --border-color: rgba(179, 155, 120, 0.4); 
            --transition-premium: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            --font-serif: 'Playfair Display', serif; --font-sans: 'Tenor Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @media (pointer: fine) {
            * { cursor: none; }
            #custom-cursor { position: fixed; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: width 0.15s ease-out, height 0.15s ease-out, background 0.15s ease-out; }
            #custom-cursor.hover { width: 40px; height: 40px; background: rgba(179, 155, 120, 0.1); border: 1px solid var(--accent); opacity: 1; }
        }
        @media (pointer: coarse) {
            #custom-cursor { display: none !important; }
            * { cursor: auto !important; }
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; display: none; height: 100vh; }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.025"/></svg>'); pointer-events: none; z-index: 50; }

        .admin-sidebar { width: 300px; background-color: rgba(245, 245, 243, 0.95); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 50px 40px; z-index: 100; position: relative; }
        .brand { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 700; color: var(--text-main); text-decoration: none; margin-bottom: 20px; display: block; letter-spacing: -0.5px; }
        .brand span { font-family: var(--font-sans); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); display: block; font-weight: 400; margin-top: 5px; }
        .auth-email { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; word-break: break-all;}

        .admin-nav { display: flex; flex-direction: column; gap: 20px; flex: 1; }
        .nav-tab { background: none; border: none; font-family: var(--font-sans); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); text-align: left; padding: 10px 0; display: flex; align-items: center; gap: 15px; transition: var(--transition-premium); position: relative; }
        .nav-tab i { font-size: 1rem; color: var(--border-color); transition: var(--transition-premium); }
        .nav-tab:hover { color: var(--text-main); }
        .nav-tab:hover i { color: var(--accent); }
        .nav-tab.active { color: var(--text-main); }
        .nav-tab.active i { color: var(--accent); }
        .nav-tab.active::after { content: ''; position: absolute; right: -40px; top: 50%; transform: translateY(-50%); width: 3px; height: 100%; background-color: var(--accent); }

        .logout-btn { background: none; border: none; text-align: left; font-family: var(--font-sans); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #d9534f; text-decoration: none; display: flex; align-items: center; gap: 10px; transition: 0.3s; margin-top: auto; }
        .logout-btn:hover { opacity: 0.7; }

        .admin-content { flex: 1; padding: 60px 8vw; overflow-y: auto; z-index: 10; position: relative; }
        .panel-section { display: none; animation: fadeIn 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .panel-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .section-header { margin-bottom: 50px; border-bottom: 1px solid var(--border-color); padding-bottom: 30px; }
        .section-title { font-family: var(--font-serif); font-size: 3rem; font-weight: 400; color: var(--text-main); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        .form-full { grid-column: 1 / -1; }

        .input-group { position: relative; margin-bottom: 10px; }
        .input-group input[type="text"], .input-group input[type="number"], .input-group input[type="url"], .input-group select, .input-group textarea { width: 100%; padding: 15px 0 10px 0; background: transparent; border: none; border-bottom: 1px solid rgba(179, 155, 120, 0.3); font-family: 'Inter', sans-serif; font-size: 1rem; color: var(--text-main); outline: none; transition: var(--transition-premium); resize: none; }
        .input-group textarea { min-height: 120px; }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-bottom-color: var(--accent); }
        
        .input-group label.floating-label { position: absolute; left: 0; top: 15px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); pointer-events: none; transition: var(--transition-premium); }
        .input-group input:focus ~ label.floating-label, .input-group input:not(:placeholder-shown) ~ label.floating-label, .input-group textarea:focus ~ label.floating-label, .input-group textarea:not(:placeholder-shown) ~ label.floating-label { top: -10px; font-size: 0.65rem; color: var(--accent); }
        .input-group select ~ label.floating-label { top: -10px; font-size: 0.65rem; color: var(--accent); }

        .submit-btn { background: transparent; border: 1px solid var(--accent); padding: 15px 40px; font-family: var(--font-sans); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-main); transition: var(--transition-premium); display: inline-flex; align-items: center; gap: 10px; }
        .submit-btn:hover { background: var(--accent); color: var(--card-bg); }

        .item-list { margin-top: 60px; border-top: 1px solid var(--border-color); padding-top: 40px; }
        .list-title { font-family: var(--font-serif); font-size: 2rem; color: var(--text-main); margin-bottom: 30px; font-weight: 400; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px dashed rgba(179, 155, 120, 0.2); transition: 0.3s; }
        .item-info h4 { font-family: var(--font-serif); font-size: 1.2rem; font-weight: 400; color: var(--text-main); margin-bottom: 5px; }
        .item-info span { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .item-actions { display: flex; gap: 10px;}
        .item-actions button { background: none; padding: 8px 15px; font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s; border-radius: 4px; }
        
        .delete-btn { border: 1px solid #d9534f; color: #d9534f; }
        .delete-btn:hover { background: #d9534f; color: #fff; }
        
        /* YENİ EKLENEN YILDIZ (ÖNE ÇIKAR) BUTONU STİLİ */
        .feature-btn { border: 1px solid var(--accent); color: var(--accent); }
        .feature-btn.active { background: var(--accent); color: #fff; }
        .feature-btn:hover { background: var(--accent); color: #fff; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .admin-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); padding: 30px 5vw; }
            .admin-content { padding: 40px 5vw; }
            .form-grid { grid-template-columns: 1fr; }
            .item-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <aside class="admin-sidebar">
        <a href="index.html" class="brand hover-target">YK. <span>Yönetim</span></a>
        <div class="auth-email" id="admin-email">Bağlanıyor...</div>
        
        <div class="admin-nav">
            <button class="nav-tab active hover-target" data-target="sentez-panel">
                <i class="fas fa-microscope"></i> Sentez (Projeler)
            </button>
            <button class="nav-tab hover-target" data-target="perspektif-panel">
                <i class="fas fa-pen-nib"></i> Perspektif (Yazılar)
            </button>
            <button class="nav-tab hover-target" data-target="doku-panel">
                <i class="fas fa-image"></i> Doku (Galeri)
            </button>
        </div>

        <button class="logout-btn hover-target" id="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Güvenli Çıkış
        </button>
    </aside>

    <main class="admin-content">
        
        <section id="sentez-panel" class="panel-section active">
            <div class="section-header">
                <h2 class="section-title">Yeni Proje Ekle</h2>
            </div>
            <form id="form-sentez">
                <div class="form-grid">
                    <div class="input-group form-full">
                        <input type="text" id="s-title" placeholder=" " required class="hover-target">
                        <label class="floating-label">Proje Başlığı</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="s-category" placeholder=" " required class="hover-target">
                        <label class="floating-label">Kategori (Örn: Veri Bilimi)</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="s-year" placeholder=" " required class="hover-target">
                        <label class="floating-label">Yıl</label>
                    </div>
                    <div class="input-group form-full">
                        <textarea id="s-excerpt" placeholder=" " required class="hover-target"></textarea>
                        <label class="floating-label">Kısa Açıklama / Özeti</label>
                    </div>
                    <div class="input-group form-full">
                        <textarea id="s-content" placeholder=" " class="hover-target" style="min-height: 250px;"></textarea>
                        <label class="floating-label">Proje Detayı / Tam Metin (İsteğe Bağlı)</label>
                    </div>
                    <div class="input-group form-full">
                        <input type="url" id="s-link" placeholder=" " class="hover-target">
                        <label class="floating-label">Bağlantı Linki (GitHub, PDF vb. - İsteğe Bağlı)</label>
                    </div>
                </div>
                <button type="submit" class="submit-btn hover-target">Arşive Kaydet <i class="fas fa-check"></i></button>
            </form>
        </section>

        <section id="perspektif-panel" class="panel-section">
            <div class="section-header">
                <h2 class="section-title">Yeni Yazı Ekle</h2>
            </div>
            <form id="form-perspektif">
                <div class="form-grid">
                    <div class="input-group form-full">
                        <input type="text" id="p-title" placeholder=" " required class="hover-target">
                        <label class="floating-label">Yazı Başlığı</label>
                    </div>
                    <div class="input-group">
                        <select id="p-type" class="hover-target">
                            <option value="Makale">Makale</option>
                            <option value="Deneme">Deneme</option>
                            <option value="Eleştiri">Eleştiri</option>
                        </select>
                        <label class="floating-label">Yazı Türü</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="p-date" placeholder=" " required class="hover-target">
                        <label class="floating-label">Tarih (Örn: Mart 2026)</label>
                    </div>
                    <div class="input-group form-full">
                        <textarea id="p-excerpt" placeholder=" " required class="hover-target"></textarea>
                        <label class="floating-label">Yazı Özeti (Sitede görünecek kısım)</label>
                    </div>
                    <div class="input-group form-full">
                        <textarea id="p-content" placeholder=" " required class="hover-target" style="min-height: 250px;"></textarea>
                        <label class="floating-label">Yazının Tamamı (İçerik)</label>
                    </div>
                </div>
                <button type="submit" class="submit-btn hover-target">Yazıyı Yayınla <i class="fas fa-check"></i></button>
            </form>
        </section>

        <section id="doku-panel" class="panel-section">
            <div class="section-header">
                <h2 class="section-title">Galeriye Görsel Yükle</h2>
            </div>
            <form id="form-doku">
                <div class="form-grid">
                    <div class="input-group form-full" style="border-bottom: 1px solid rgba(179, 155, 120, 0.3); padding-bottom: 10px; margin-top: 10px;">
                        <label style="position: static; font-size: 0.75rem; color: var(--accent); margin-bottom: 10px; display: block; pointer-events: auto;">Görsel Dosyası Yükle (Zorunlu)</label>
                        <input type="file" id="d-file" accept="image/*" required class="hover-target" style="border: none; padding: 0;">
                    </div>
                    <div class="input-group form-full">
                        <input type="text" id="d-title" placeholder=" " required class="hover-target">
                        <label class="floating-label">Görsel Başlığı (Zorunlu)</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="d-category" placeholder=" " class="hover-target">
                        <label class="floating-label">Kategori (İsteğe Bağlı)</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="d-year" placeholder=" " class="hover-target">
                        <label class="floating-label">Yıl (İsteğe Bağlı)</label>
                    </div>
                    <div class="input-group form-full">
                        <textarea id="d-desc" placeholder=" " class="hover-target"></textarea>
                        <label class="floating-label">Alt Açıklama (İsteğe Bağlı)</label>
                    </div>
                </div>
                <button type="submit" class="submit-btn hover-target">Görseli Yükle <i class="fas fa-upload"></i></button>
            </form>
        </section>

        <section class="item-list">
            <h2 class="list-title">Arşiv Yönetimi</h2>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px;">Son eklenenleri silebilir veya ana sayfada öne çıkarabilirsiniz.</p>
            <div id="admin-management-list">
                <div style="padding: 20px 0; color: var(--accent);"><i class="fas fa-circle-notch fa-spin"></i> Veriler getiriliyor...</div>
            </div>
        </section>

    </main>

    <script type="module">
        // updateDoc eklendi (Veri güncellemek/yıldızlamak için)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, query, orderBy, limit, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        const IMGBB_API_KEY = "cc4c7248a394919486e74ab02cdf1954";

        const firebaseConfig = {
            apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4",
            authDomain: "yk-blog-9720b.firebaseapp.com",
            projectId: "yk-blog-9720b",
            messagingSenderId: "863054301539",
            appId: "1:863054301539:web:4256589fbef613bd0e6b56"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.body.style.display = 'flex';
                document.getElementById('admin-email').textContent = user.email;
            } else {
                window.location.href = 'login.html';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = 'login.html'; });
        });

        /* SENTEZ */
        document.getElementById('form-sentez').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Kaydediliyor...';
            
            try {
                await addDoc(collection(db, "sentez"), {
                    title: document.getElementById('s-title').value,
                    category: document.getElementById('s-category').value,
                    year: document.getElementById('s-year').value,
                    excerpt: document.getElementById('s-excerpt').value,
                    content: document.getElementById('s-content').value,
                    link: document.getElementById('s-link').value || "",
                    isFeatured: false, // Yeni projeler default olarak öne çıkmaz
                    createdAt: serverTimestamp()
                });
                e.target.reset();
                btn.innerHTML = 'Arşive Eklendi <i class="fas fa-check"></i>';
                btn.style.color = "#4CAF50"; btn.style.borderColor = "#4CAF50";
                setTimeout(() => { loadManagement(); }, 1000); 
            } catch (error) {
                btn.innerHTML = 'Hata Oluştu! <i class="fas fa-times"></i>';
                btn.style.color = "#d9534f"; btn.style.borderColor = "#d9534f";
            }
            setTimeout(() => { btn.innerHTML = originalText; btn.style.color = ''; btn.style.borderColor = ''; }, 3000);
        });

        /* PERSPEKTİF */
        document.getElementById('form-perspektif').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Yayınlanıyor...';

            try {
                await addDoc(collection(db, "perspektif"), {
                    title: document.getElementById('p-title').value,
                    type: document.getElementById('p-type').value,
                    date: document.getElementById('p-date').value,
                    excerpt: document.getElementById('p-excerpt').value,
                    content: document.getElementById('p-content').value,
                    createdAt: serverTimestamp()
                });
                e.target.reset();
                btn.innerHTML = 'Yazı Yayınlandı <i class="fas fa-check"></i>';
                btn.style.color = "#4CAF50"; btn.style.borderColor = "#4CAF50";
                setTimeout(() => { loadManagement(); }, 1000);
            } catch (error) {
                btn.innerHTML = 'Hata Oluştu! <i class="fas fa-times"></i>';
                btn.style.color = "#d9534f"; btn.style.borderColor = "#d9534f";
            }
            setTimeout(() => { btn.innerHTML = originalText; btn.style.color = ''; btn.style.borderColor = ''; }, 3000);
        });

        /* DOKU */
        document.getElementById('form-doku').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Görsel Yükleniyor...';

            const fileInput = document.getElementById('d-file');
            const file = fileInput.files[0];

            if (!file) { alert("Lütfen bir görsel seçin."); btn.innerHTML = originalText; return; }

            try {
                const formData = new FormData(); formData.append("image", file);
                const uploadResponse = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                const uploadData = await uploadResponse.json();
                if (!uploadData.success) throw new Error("ImgBB Yükleme Hatası");

                const downloadURL = uploadData.data.url;

                await addDoc(collection(db, "doku"), {
                    title: document.getElementById('d-title').value,
                    category: document.getElementById('d-category').value || "",
                    year: document.getElementById('d-year').value || "",
                    desc: document.getElementById('d-desc').value || "",
                    imageUrl: downloadURL,
                    createdAt: serverTimestamp()
                });
                
                e.target.reset();
                btn.innerHTML = 'Galeriye Eklendi <i class="fas fa-check"></i>';
                btn.style.color = "#4CAF50"; btn.style.borderColor = "#4CAF50";
                setTimeout(() => { loadManagement(); }, 1000);
            } catch (error) {
                btn.innerHTML = 'Hata Oluştu! <i class="fas fa-times"></i>';
                btn.style.color = "#d9534f"; btn.style.borderColor = "#d9534f";
            }
            setTimeout(() => { btn.innerHTML = originalText; btn.style.color = ''; btn.style.borderColor = ''; }, 3000);
        });

        /* YÖNETİM VE ÖNE ÇIKARMA SİSTEMİ */
        async function loadManagement() {
            const listDiv = document.getElementById('admin-management-list');
            listDiv.innerHTML = '';
            
            try {
                const collections = ['sentez', 'perspektif', 'doku'];
                let hasItem = false;

                for (const collName of collections) {
                    // Yönetim listesine son eklenen 5 öğeyi getir
                    const q = query(collection(db, collName), orderBy("createdAt", "desc"), limit(5));
                    const snap = await getDocs(q);
                    
                    snap.forEach(d => {
                        hasItem = true;
                        const data = d.data();
                        const div = document.createElement('div');
                        div.className = 'list-item';
                        
                        // Eğer koleksiyon sentez ise "Yıldız" butonu ekle
                        let featureButtonHTML = '';
                        if (collName === 'sentez') {
                            const isFeaturedClass = data.isFeatured ? 'active' : '';
                            const isFeaturedTitle = data.isFeatured ? 'Öne Çıkarıldı' : 'Vitrine Ekle';
                            featureButtonHTML = `
                                <button class="feature-btn hover-target ${isFeaturedClass}" data-id="${d.id}" data-featured="${data.isFeatured || false}" title="${isFeaturedTitle}">
                                    <i class="fas fa-star"></i>
                                </button>
                            `;
                        }

                        div.innerHTML = `
                            <div class="item-info">
                                <h4>${data.title}</h4>
                                <span>Kategori: ${collName.toUpperCase()}</span>
                            </div>
                            <div class="item-actions">
                                ${featureButtonHTML}
                                <button class="delete-btn hover-target" data-id="${d.id}" data-coll="${collName}">
                                    <i class="fas fa-trash-alt"></i> SİL
                                </button>
                            </div>
                        `;
                        listDiv.appendChild(div);
                    });
                }

                if(!hasItem) { listDiv.innerHTML = '<div style="padding: 20px 0; color: var(--text-muted);">Arşivde yönetilecek içerik bulunmuyor.</div>'; }

                // İMLEÇ VE BUTON EVENTLERİ EKLENİYOR
                const cursor = document.getElementById('custom-cursor');
                
                // Silme Eventi
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('mouseover', () => { if(cursor) cursor.classList.add('hover'); });
                    btn.addEventListener('mouseout', () => { if(cursor) cursor.classList.remove('hover'); });

                    btn.addEventListener('click', async (e) => {
                        e.preventDefault();
                        if(confirm("Bu içeriği arşivden tamamen silmek istediğine emin misin?")) {
                            const btnEl = e.currentTarget;
                            const id = btnEl.getAttribute('data-id');
                            const coll = btnEl.getAttribute('data-coll');
                            btnEl.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
                            
                            try {
                                await deleteDoc(doc(db, coll, id));
                                btnEl.closest('.list-item').remove();
                            } catch (err) { alert("Silme başarısız!"); btnEl.innerHTML = '<i class="fas fa-trash-alt"></i> SİL'; }
                        }
                    });
                });

                // Öne Çıkarma (Yıldız) Eventi
                document.querySelectorAll('.feature-btn').forEach(btn => {
                    btn.addEventListener('mouseover', () => { if(cursor) cursor.classList.add('hover'); });
                    btn.addEventListener('mouseout', () => { if(cursor) cursor.classList.remove('hover'); });

                    btn.addEventListener('click', async (e) => {
                        e.preventDefault();
                        const btnEl = e.currentTarget;
                        const id = btnEl.getAttribute('data-id');
                        const isCurrentlyFeatured = btnEl.getAttribute('data-featured') === 'true';
                        
                        btnEl.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
                        
                        try {
                            const projectRef = doc(db, 'sentez', id);
                            await updateDoc(projectRef, { isFeatured: !isCurrentlyFeatured });
                            
                            // Arayüzü güncelle
                            btnEl.setAttribute('data-featured', !isCurrentlyFeatured);
                            btnEl.innerHTML = '<i class="fas fa-star"></i>';
                            if (!isCurrentlyFeatured) {
                                btnEl.classList.add('active');
                                btnEl.title = "Öne Çıkarıldı";
                            } else {
                                btnEl.classList.remove('active');
                                btnEl.title = "Vitrine Ekle";
                            }
                        } catch (err) {
                            alert("İşlem başarısız!");
                            btnEl.innerHTML = '<i class="fas fa-star"></i>';
                        }
                    });
                });

            } catch (err) { listDiv.innerHTML = '<div style="padding: 20px 0; color: #d9534f;">İçerikler yüklenemedi.</div>'; }
        }

        loadManagement();
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.matchMedia("(pointer: fine)").matches) {
                const cursor = document.getElementById('custom-cursor');
                document.addEventListener('mousemove', e => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                });
                document.querySelectorAll('.hover-target, button, input, textarea, select, a').forEach(t => {
                    t.addEventListener('mouseover', () => cursor.classList.add('hover'));
                    t.addEventListener('mouseout', () => cursor.classList.remove('hover'));
                });
            }

            const tabs = document.querySelectorAll('.nav-tab');
            const panels = document.querySelectorAll('.panel-section');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    const targetId = tab.getAttribute('data-target');
                    panels.forEach(p => p.classList.remove('active'));
                    document.getElementById(targetId).classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
