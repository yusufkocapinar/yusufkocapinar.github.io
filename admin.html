<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontrol Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAFAFA;
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --border-color: #EAEAEA;
            --danger: #D32F2F;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Inter', sans-serif; display: none; min-height: 100vh;
        }
        body.auth-ready { display: block; }
        
        .container { max-width: 70ch; margin: 0 auto; padding: 50px 5vw; }

        header { border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: baseline; }
        header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.5px; }
        
        .nav-tabs { display: flex; gap: 20px; margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .tab { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .tab:hover, .tab.active { color: var(--text-main); font-weight: 600; }
        
        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .group { margin-bottom: 25px; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
        input, select, textarea {
            width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid var(--border-color);
            background: transparent; font-family: inherit; font-size: 1rem; color: var(--text-main); outline: none; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-bottom-color: var(--text-main); }
        textarea { min-height: 150px; resize: vertical; }

        .btn-main { background: var(--text-main); color: #fff; border: none; padding: 15px 30px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-main:hover { opacity: 0.8; }
        .btn-logout { background: none; border: none; color: var(--danger); font-size: 0.8rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        .item-list { list-style: none; }
        .list-row { padding: 20px 0; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .list-row h3 { font-size: 1.1rem; font-weight: 500; margin-bottom: 5px; }
        .list-row span { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
        .del-btn { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 5px 10px; font-size: 0.7rem; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Kontrol Merkezi</h1>
            <button class="btn-logout" id="logout-btn">Çıkış</button>
        </header>

        <div class="nav-tabs">
            <span class="tab active" data-target="panel-add">İçerik Ekle</span>
            <span class="tab" data-target="panel-list">Arşiv Yönetimi</span>
        </div>

        <section id="panel-add" class="panel active">
            <form id="add-form">
                <div class="group">
                    <label>Koleksiyon</label>
                    <select id="u-col" required>
                        <option value="perspektif">Perspektif (Yazı/Deneme)</option>
                        <option value="sentez">Sentez (Akademik)</option>
                        <option value="doku">Doku (Görsel)</option>
                    </select>
                </div>
                <div class="group">
                    <label>Başlık</label>
                    <input type="text" id="u-title" required>
                </div>
                <div class="group">
                    <label>Tür / Kategori</label>
                    <input type="text" id="u-type">
                </div>
                <div class="group">
                    <label>Tarih / Yıl</label>
                    <input type="text" id="u-time">
                </div>
                <div class="group" id="file-group" style="display:none;">
                    <label>Görsel Dosyası</label>
                    <input type="file" id="u-file" accept="image/*">
                </div>
                <div class="group">
                    <label>Özet (Ana Sayfa Görünümü)</label>
                    <textarea id="u-excerpt" style="min-height: 80px;" required></textarea>
                </div>
                <div class="group" id="content-group">
                    <label>Tam Metin</label>
                    <textarea id="u-content"></textarea>
                </div>
                <button type="submit" class="btn-main">Arşive İşle</button>
            </form>
        </section>

        <section id="panel-list" class="panel">
            <ul class="item-list" id="archive-list">
                </ul>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCr4HhlythyRIfy_Xnb-IaWr0Th0TkUQi4", authDomain: "yk-blog-9720b.firebaseapp.com", projectId: "yk-blog-9720b", messagingSenderId: "863054301539", appId: "1:863054301539:web:4256589fbef613bd0e6b56" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const IMGBB_API_KEY = "cc4c7248a394919486e74ab02cdf1954";

        onAuthStateChanged(auth, (user) => {
            if (user) document.body.classList.add('auth-ready');
            else window.location.href = 'login.html';
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // TAB YÖNETİMİ
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.target).classList.add('active');
                if(tab.dataset.target === 'panel-list') loadArchive();
            });
        });

        const colSelect = document.getElementById('u-col');
        colSelect.addEventListener('change', () => {
            const isImg = colSelect.value === 'doku';
            document.getElementById('file-group').style.display = isImg ? 'block' : 'none';
            document.getElementById('content-group').style.display = isImg ? 'none' : 'block';
        });

        // FORM GÖNDERİMİ
        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const col = colSelect.value;
            btn.textContent = 'İşleniyor...'; btn.disabled = true;

            try {
                let data = {
                    title: document.getElementById('u-title').value,
                    excerpt: document.getElementById('u-excerpt').value,
                    createdAt: serverTimestamp()
                };

                if (col === 'doku') {
                    const file = document.getElementById('u-file').files[0];
                    const fd = new FormData(); fd.append("image", file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                    const resData = await res.json();
                    data.imageUrl = resData.data.url;
                    data.category = document.getElementById('u-type').value;
                    data.year = document.getElementById('u-time').value;
                } else {
                    data.content = document.getElementById('u-content').value;
                    if(col === 'perspektif') { data.type = document.getElementById('u-type').value; data.date = document.getElementById('u-time').value; } 
                    else { data.category = document.getElementById('u-type').value; data.year = document.getElementById('u-time').value; }
                }

                await addDoc(collection(db, col), data);
                e.target.reset();
                btn.textContent = 'Başarıyla Eklendi';
            } catch (err) {
                alert("Hata: " + err.message);
                btn.textContent = 'Hata Oluştu';
            }
            setTimeout(() => { btn.textContent = 'Arşive İşle'; btn.disabled = false; }, 2000);
        });

        // LİSTE VE SİLME
        async function loadArchive() {
            const ul = document.getElementById('archive-list');
            ul.innerHTML = 'Yükleniyor...';
            let html = '';
            for (const c of ['perspektif', 'sentez', 'doku']) {
                const snap = await getDocs(query(collection(db, c), orderBy("createdAt", "desc")));
                snap.forEach(d => {
                    html += `
                        <li class="list-row">
                            <div>
                                <h3>${d.data().title}</h3>
                                <span>${c} • ${d.data().year || d.data().date || ''}</span>
                            </div>
                            <button class="del-btn" onclick="delItem('${c}', '${d.id}')">SİL</button>
                        </li>
                    `;
                });
            }
            ul.innerHTML = html || 'Kayıt bulunamadı.';
        }

        window.delItem = async (c, id) => {
            if(confirm("Silmek istediğine emin misin?")) {
                await deleteDoc(doc(db, c, id));
                loadArchive();
            }
        };
    </script>
</body>
</html>
